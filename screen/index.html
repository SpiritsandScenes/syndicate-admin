<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Syndicate — Big Screen</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎭</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,700&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:    #04030A;
      --gold:  #C9A84C;
      --cream: #F0E4C4;
      --muted: #5A5070;
      --red:   #8B2020;
      --dim:   rgba(201,168,76,0.12);
      --line:  rgba(201,168,76,0.18);
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; background:var(--bg); overflow:hidden; }
    body {
      font-family:'Josefin Sans',sans-serif;
      color:var(--cream);
      -webkit-font-smoothing:antialiased;
    }

    /* ── Atmospheric background ── */
    .bg {
      position:fixed; inset:0; z-index:0;
      background:
        radial-gradient(ellipse 100% 70% at 50% -10%, rgba(201,168,76,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 0% 100%, rgba(139,32,32,0.06) 0%, transparent 50%),
        radial-gradient(ellipse 50% 50% at 100% 100%, rgba(139,32,32,0.04) 0%, transparent 50%);
    }
    /* Subtle scanline texture */
    .scanlines {
      position:fixed; inset:0; z-index:1; pointer-events:none;
      background:repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
      );
    }

    /* ── Main layout ── */
    .screen {
      position:relative; z-index:2;
      width:100vw; height:100vh;
      display:grid;
      grid-template-rows:auto 1fr auto;
      padding:32px 48px;
      gap:0;
    }

    /* ── Header ── */
    .header {
      display:flex; align-items:center; justify-content:space-between;
      padding-bottom:20px;
      border-bottom:1px solid var(--line);
      margin-bottom:28px;
    }
    .header-left { display:flex; align-items:center; gap:16px; }
    .header-crest {
      font-size:28px;
      filter:drop-shadow(0 0 12px rgba(201,168,76,0.4));
    }
    .header-title-block {}
    .header-title {
      font-family:'Cormorant Garamond',serif;
      font-size:13px; font-weight:700;
      letter-spacing:0.45em; text-transform:uppercase;
      color:var(--gold); margin-bottom:2px;
    }
    .header-scenario {
      font-family:'Cormorant Garamond',serif;
      font-size:22px; font-weight:700; font-style:italic;
      color:var(--cream);
    }
    .header-right { text-align:right; }
    .header-venue {
      font-size:9px; letter-spacing:0.3em; text-transform:uppercase;
      color:var(--muted); margin-bottom:3px;
    }
    .header-date {
      font-family:'Cormorant Garamond',serif;
      font-size:16px; color:var(--cream); opacity:0.7;
    }
    .round-display {
      text-align:center;
      padding:0 24px;
    }
    .round-number {
      font-family:'Cormorant Garamond',serif;
      font-size:72px; font-weight:300; line-height:1;
      color:var(--gold); opacity:0.15;
      position:relative;
    }
    .round-label-sm {
      font-size:8px; letter-spacing:0.4em; text-transform:uppercase;
      color:var(--gold); position:absolute; bottom:14px; left:50%;
      transform:translateX(-50%); white-space:nowrap;
    }

    /* ── Main content area ── */
    .main {
      display:grid;
      grid-template-columns:1fr 1.4fr 1fr;
      gap:24px;
      align-items:start;
    }

    /* ── Column card ── */
    .col-card {
      background:rgba(255,255,255,0.025);
      border:1px solid var(--line);
      border-radius:2px;
      padding:20px;
      position:relative;
    }
    .col-card::before {
      content:''; position:absolute;
      top:0; left:0; right:0; height:2px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
    }
    .col-title {
      font-size:8px; letter-spacing:0.4em; text-transform:uppercase;
      color:var(--gold); margin-bottom:16px;
    }

    /* ── Clue display ── */
    .clue-display {
      grid-column:2;
    }
    .clue-type-tag {
      display:inline-flex; align-items:center; gap:6px;
      padding:4px 12px;
      border-radius:2px;
      font-size:8px; letter-spacing:0.3em; text-transform:uppercase;
      font-weight:600; margin-bottom:12px;
    }
    .clue-title-lg {
      font-family:'Cormorant Garamond',serif;
      font-size:24px; font-weight:700;
      color:var(--cream); margin-bottom:14px;
      line-height:1.2;
    }
    .clue-text-lg {
      font-family:'Cormorant Garamond',serif;
      font-size:18px; line-height:1.75;
      color:var(--cream); opacity:0.85;
    }
    .clue-time {
      font-size:9px; letter-spacing:0.2em; text-transform:uppercase;
      color:var(--muted); margin-top:14px;
    }

    /* ── Suspect list ── */
    .suspect-item {
      display:flex; align-items:center; gap:10px;
      padding:8px 0;
      border-bottom:1px solid rgba(255,255,255,0.04);
    }
    .suspect-item:last-child { border-bottom:none; }
    .s-av {
      width:30px; height:30px; border-radius:50%;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      display:flex; align-items:center; justify-content:center;
      font-size:9px; font-weight:600; color:var(--muted);
      flex-shrink:0;
    }
    .s-info { flex:1; }
    .s-name {
      font-size:11px; font-weight:600; letter-spacing:0.06em;
      color:var(--cream); margin-bottom:1px;
    }
    .s-pos {
      font-size:8px; letter-spacing:0.15em; text-transform:uppercase;
      color:var(--muted);
    }
    .s-elim {
      font-size:7px; letter-spacing:0.2em; text-transform:uppercase;
      color:var(--red); padding:2px 6px;
      border:1px solid rgba(139,32,32,0.3);
      border-radius:2px;
    }

    /* ── Players online ── */
    .player-item {
      display:flex; align-items:center; gap:8px;
      padding:7px 0;
      border-bottom:1px solid rgba(255,255,255,0.04);
    }
    .player-item:last-child { border-bottom:none; }
    .p-dot {
      width:6px; height:6px; border-radius:50%;
      flex-shrink:0;
    }
    .p-dot.online  { background:#27AE60; }
    .p-dot.offline { background:rgba(255,255,255,0.1); }
    .p-name { font-size:11px; color:var(--cream); flex:1; }
    .p-char { font-size:9px; letter-spacing:0.1em; color:var(--muted); }

    /* ── Vote tally ── */
    .vote-tally-title {
      font-family:'Cormorant Garamond',serif;
      font-size:20px; font-style:italic;
      color:#e57373; margin-bottom:14px;
    }
    .tally-row { margin-bottom:10px; }
    .tally-header {
      display:flex; justify-content:space-between;
      font-size:10px; letter-spacing:0.1em;
      color:var(--cream); margin-bottom:4px;
    }
    .tally-bar-bg {
      height:4px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden;
    }
    .tally-bar-fill {
      height:100%; border-radius:2px;
      background:rgba(192,57,43,0.7);
      transition:width 0.6s ease;
    }

    /* ── Lobby big screen ── */
    .lobby-big {
      grid-column:1/-1;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      text-align:center; gap:20px;
      padding:40px 0;
    }
    .lobby-big-title {
      font-family:'Cormorant Garamond',serif;
      font-size:64px; font-weight:700; font-style:italic;
      color:var(--cream); line-height:1;
    }
    .lobby-big-sub {
      font-size:11px; letter-spacing:0.4em; text-transform:uppercase;
      color:var(--gold);
    }
    .lobby-big-premise {
      font-family:'Cormorant Garamond',serif;
      font-size:20px; line-height:1.8; font-style:italic;
      color:var(--cream); opacity:0.65;
      max-width:700px;
    }
    .join-url-block {
      padding:16px 32px;
      background:rgba(201,168,76,0.06);
      border:1px solid var(--line);
      border-radius:2px;
    }
    .join-url-label {
      font-size:8px; letter-spacing:0.4em; text-transform:uppercase;
      color:var(--muted); margin-bottom:6px;
    }
    .join-url {
      font-family:'Cormorant Garamond',serif;
      font-size:22px; color:var(--gold);
      letter-spacing:0.05em;
    }

    /* ── Eliminated overlay ── */
    .elim-flash {
      position:fixed; inset:0; z-index:50;
      background:rgba(139,32,32,0.85);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:16px; text-align:center;
      animation:flashIn 0.3s ease;
    }
    .elim-flash-title {
      font-family:'Cormorant Garamond',serif;
      font-size:80px; font-weight:700; font-style:italic;
      color:white; line-height:1;
    }
    .elim-flash-name {
      font-family:'Cormorant Garamond',serif;
      font-size:40px; font-style:italic;
      color:rgba(255,255,255,0.8);
    }
    .elim-flash-sub {
      font-size:12px; letter-spacing:0.35em; text-transform:uppercase;
      color:rgba(255,255,255,0.5);
    }

    /* ── Footer ── */
    .footer {
      padding-top:16px;
      border-top:1px solid var(--line);
      display:flex; align-items:center; justify-content:space-between;
    }
    .footer-left {
      font-size:8px; letter-spacing:0.3em; text-transform:uppercase;
      color:var(--muted);
    }
    .footer-right {
      display:flex; align-items:center; gap:8px;
      font-size:8px; letter-spacing:0.2em; text-transform:uppercase;
      color:var(--muted);
    }
    .live-dot {
      width:6px; height:6px; border-radius:50%;
      background:#27AE60;
      animation:pulse 1.8s ease infinite;
    }

    @keyframes flashIn  { from{opacity:0} to{opacity:1} }
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
  </style>
</head>
<body>
<div class="bg"></div>
<div class="scanlines"></div>
<div class="screen" id="screen">
  <div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;height:100%;opacity:0.4;">
    <span style="font-size:11px;letter-spacing:0.4em;text-transform:uppercase;color:var(--muted);">Connecting…</span>
  </div>
</div>

<script src="../syndicate-data.js"></script>
<script>
let G = null;
let prevEliminated = [];

// ── Render ─────────────────────────────────────────────────────
function render() {
  const phase = G.gamePhase;
  const sc = document.getElementById("screen");

  if (G.currentRound === 0 || phase === "lobby") {
    renderLobby(sc); return;
  }
  if (phase === "ended") {
    renderEnded(sc); return;
  }
  renderActive(sc);
}

function renderLobby(sc) {
  const base = window.location.href.replace(/\/screen\/?.*/, "");
  sc.innerHTML = `
    <div class="header">
      <div class="header-left">
        <div class="header-crest">🎭</div>
        <div class="header-title-block">
          <div class="header-title">The Syndicate</div>
          <div class="header-scenario">${G.scenarioName}</div>
        </div>
      </div>
      <div class="header-right">
        <div class="header-venue">${G.venue}</div>
        <div class="header-date">${G.date}</div>
      </div>
    </div>

    <div class="main">
      <div class="lobby-big">
        <div class="lobby-big-sub">Tonight's Event</div>
        <div class="lobby-big-title">${G.scenarioName}</div>
        <div class="lobby-big-premise">${G.premise}</div>
        <div class="join-url-block">
          <div class="join-url-label">Scan your invite card QR or visit</div>
          <div class="join-url">${base}/join/</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-left">The Gilded Barrel · November 3rd, 1927</div>
      <div class="footer-right"><div class="live-dot"></div> Live</div>
    </div>
  `;
}

function renderActive(sc) {
  const eliminated = G.eliminatedChars || [];
  const typeColors = { dispatch:"#C9A84C",evidence:"#2E86C1",private:"#8E44AD",tip:"#27AE60",final:"#C0392B" };
  const typeLabels = { dispatch:"Dispatch",evidence:"Evidence",private:"Private",tip:"Tip",final:"Final" };

  // Latest public clue
  const publicClues = G.clues.filter(c =>
    !c.private && G.dispatchedClues.includes(c.id)
  );
  const latest = publicClues[publicClues.length - 1];

  // Vote tally for current round
  const votes = (G.votes || {})[G.currentRound] || {};
  const tally = {};
  Object.values(votes).forEach(charId => { tally[charId] = (tally[charId]||0)+1; });
  const tallyEntries = Object.entries(tally)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5)
    .map(([id,n]) => ({ name:G.characters[id]?.name||id, count:n }));
  const maxVotes = tallyEntries[0]?.count || 1;

  sc.innerHTML = `
    <div class="header">
      <div class="header-left">
        <div class="header-crest">🎭</div>
        <div class="header-title-block">
          <div class="header-title">The Syndicate</div>
          <div class="header-scenario">${G.scenarioName}</div>
        </div>
      </div>
      <div class="round-display">
        <div class="round-number" style="position:relative">
          ${G.currentRound}
          <span class="round-label-sm">${getRoundLabel(G.currentRound)}</span>
        </div>
      </div>
      <div class="header-right">
        <div class="header-venue">${G.venue}</div>
        <div class="header-date">${G.date}</div>
      </div>
    </div>

    <div class="main">
      <!-- Left: Suspects -->
      <div class="col-card">
        <div class="col-title">Active Suspects</div>
        ${Object.entries(G.characters).map(([id,c]) => `
          <div class="suspect-item">
            <div class="s-av">${c.avatar}</div>
            <div class="s-info">
              <div class="s-name">${c.name}</div>
              <div class="s-pos">${c.position}</div>
            </div>
            ${eliminated.includes(id) ? `<span class="s-elim">Out</span>` : ""}
          </div>
        `).join("")}
      </div>

      <!-- Centre: Latest clue -->
      <div class="col-card clue-display">
        ${latest ? `
          <div class="clue-type-tag" style="background:${typeColors[latest.type]}22;color:${typeColors[latest.type]};border:1px solid ${typeColors[latest.type]}44">
            ${typeLabels[latest.type] || latest.type}
          </div>
          <div class="clue-title-lg">${latest.title}</div>
          <div class="clue-text-lg">${latest.text}</div>
          <div class="clue-time">Round ${latest.round} · ${latest.time||""}</div>
        ` : `
          <div style="text-align:center;padding:40px 0;opacity:0.3">
            <div style="font-size:32px;margin-bottom:12px">🔍</div>
            <div style="font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted)">
              No evidence dispatched yet
            </div>
          </div>
        `}
      </div>

      <!-- Right: Players + votes -->
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div class="col-card">
          <div class="col-title">Players Online</div>
          ${G.players.map(p => `
            <div class="player-item">
              <div class="p-dot ${p.joined?"online":"offline"}"></div>
              <div class="p-name">${p.name}</div>
              <div class="p-char">${G.characters[p.character]?.avatar||""}</div>
            </div>
          `).join("")}
        </div>

        ${G.votingOpen ? `
          <div class="col-card">
            <div class="vote-tally-title">Vote Tally</div>
            ${tallyEntries.length ? tallyEntries.map(t => `
              <div class="tally-row">
                <div class="tally-header">
                  <span>${t.name}</span>
                  <span>${t.count}</span>
                </div>
                <div class="tally-bar-bg">
                  <div class="tally-bar-fill" style="width:${Math.round((t.count/maxVotes)*100)}%"></div>
                </div>
              </div>
            `).join("") : `
              <div style="font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);text-align:center;padding:12px">
                Waiting for votes
              </div>
            `}
          </div>
        ` : ""}
      </div>
    </div>

    <div class="footer">
      <div class="footer-left">
        ${eliminated.length} eliminated · ${G.players.filter(p=>p.joined).length}/${G.players.length} online
      </div>
      <div class="footer-right"><div class="live-dot"></div> Round ${G.currentRound} Live</div>
    </div>
  `;
}

function renderEnded(sc) {
  const won = G.winner === "civilians";
  const killer = Object.entries(G.characters).find(([,c])=>c.role==="KILLER");
  sc.innerHTML = `
    <div style="grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;text-align:center;padding:40px;">
      <div style="font-size:72px">${won?"⚖️":"💀"}</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:80px;font-weight:700;font-style:italic;color:var(--cream);">
        ${won?"Justice Served":"The Killer Escapes"}
      </div>
      <div style="font-size:12px;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold)">
        ${won?"The Syndicate found the murderer":"Dominic Caruso walks free"}
      </div>
      <div style="background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);border-radius:4px;padding:24px 48px;text-align:center;">
        <div style="font-size:9px;letter-spacing:0.35em;text-transform:uppercase;color:var(--red);margin-bottom:10px;">The Killer Was</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:700;font-style:italic;color:var(--cream)">
          ${killer?killer[1].name:"Unknown"}
        </div>
      </div>
    </div>
  `;
}

// ── Poll ───────────────────────────────────────────────────────
async function init() {
  G = await SyndicateSync.read();
  render();
  SyndicateSync.poll(newState => {
    // Check for new elimination
    const newElim = (newState.eliminatedChars||[]).filter(id=>!prevEliminated.includes(id));
    prevEliminated = newState.eliminatedChars || [];
    G = newState;
    render();
    if (newElim.length) showEliminationFlash(newElim[0]);
  }, 3000);
}

function showEliminationFlash(charId) {
  const char = G.characters[charId];
  if (!char) return;
  const el = document.createElement("div");
  el.className = "elim-flash";
  el.innerHTML = `
    <div class="elim-flash-title">Eliminated</div>
    <div class="elim-flash-name">${char.name}</div>
    <div class="elim-flash-sub">${char.position}</div>
  `;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

init();
</script>
</body>
</html>
