// MAIN ADMIN APP
// ══════════════════════════════════════════════════════════════════
const NAV = [
  { id:"scenarios", icon:"◈", label:"Scenarios" },
  { id:"story",     icon:"📖", label:"Story" },
  { id:"rounds",    icon:"⏱", label:"Rounds" },
  { id:"characters",icon:"🎭", label:"Characters" },
  { id:"clues",     icon:"📜", label:"Clues" },
  { id:"suspects",  icon:"👁", label:"Suspects" },
  { id:"players",   icon:"👥", label:"Players" },
  { id:"live",      icon:"⚡", label:"Live" },
  { id:"preview",   icon:"◆", label:"Preview" },
];

function AdminPortal() {
  const [loggedIn, setLoggedIn]     = useState(false);
  const [scenarios, setScenarios]   = useState(SEED_SCENARIOS);
  const [activeScenId, setActiveScenId] = useState("s1");
  const [activeNav, setActiveNav]   = useState("scenarios");
  const [toast, setToast]           = useState(null);
  const [saving, setSaving]         = useState(false);
  const [showKeyBanner, setShowKeyBanner] = useState(
    !localStorage.getItem("syndicate-master-key")
  );

  function saveWriteKey(key) {
    if (!key || key.length < 20) return;
    localStorage.setItem("syndicate-master-key", key.trim());
    setShowKeyBanner(false);
  }

  const scenario = scenarios.find(s=>s.id===activeScenId);

  // Persist to storage
  function persist(newScenarios) {
    try {
      localStorage.setItem("syndicate-scenarios", JSON.stringify(newScenarios));
    } catch(e) {}
    // Sync to JSONbin using master key stored in localStorage (never in GitHub)
    const binKey = localStorage.getItem("syndicate-master-key") || "";
    const binId  = "69b1c802c3097a1dd5191e0f";
    if (binKey) {
      const activeS = newScenarios.find(s=>s.id==="s1");
      if (activeS) {
        const gameState = buildGameState(activeS);
        fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
          method:"PUT",
          headers:{"Content-Type":"application/json","X-Master-Key":binKey,"X-Bin-Versioning":"false"},
          body:JSON.stringify(gameState)
        }).catch(()=>{});
      }
    }
  }

  function buildGameState(scenario) {
    return {
      scenarioId:    scenario.id,
      scenarioName:  scenario.name,
      setting:       scenario.setting,
      venue:         scenario.story?.venue   || "",
      date:          scenario.story?.date    || "",
      victim:        scenario.story?.victim  || "",
      premise:       scenario.story?.premise || "",
      currentRound:  scenario.liveRound      || 0,
      gamePhase:     scenario.gamePhase      || "lobby",
      votingOpen:    scenario.votingOpen     || false,
      winner:        scenario.winner         || null,
      dispatchedClues: scenario.dispatchedClues || [],
      votes:         scenario.votes          || {},
      eliminatedChars: (scenario.suspects||[]).filter(s=>s.eliminated).map(s=>s.charId),
      players:       scenario.players        || [],
      characters:    Object.fromEntries((scenario.characters||[]).map(c=>[c.id,{
        name:c.name, avatar:c.avatar, role:c.role,
        position:c.position, alibi:c.alibi,
        objective:c.objective, secret:c.secret
      }])),
      clues:         scenario.clues          || [],
    };
  }

  // Load from storage on mount
  useEffect(() => {
    try {
      const saved = localStorage.getItem("syndicate-scenarios");
      if (saved) setScenarios(JSON.parse(saved));
    } catch(e) {}
  }, []);

  function updateScenario(updates) {
    const next = scenarios.map(s => s.id===activeScenId ? {...s,...updates,lastEdited:new Date().toISOString().slice(0,10)} : s);
    setScenarios(next);
    persist(next);
    setToast({ msg:"Saved", type:"success" });
  }

  function addScenario() {
    const s = {
      id:uid(), name:"New Scenario", setting:"Edit setting...",
      status:"draft", players:0, lastEdited:new Date().toISOString().slice(0,10),
      rounds:[], characters:[], clues:[], suspects:[], players:[],
    };
    const next = [...scenarios, s];
    setScenarios(next);
    persist(next);
    setActiveScenId(s.id);
    setActiveNav("story");
  }

  function deleteScenario(id) {
    const next = scenarios.filter(s=>s.id!==id);
    setScenarios(next);
    persist(next);
    if (activeScenId===id) setActiveScenId(next[0]?.id||null);
  }

  if (!loggedIn) return <LoginScreen onLogin={()=>setLoggedIn(true)} />;

  const scenarioSections = ["story","rounds","characters","clues","suspects","players","live","preview"];
  const showScenarioBar = scenarioSections.includes(activeNav) && scenario;

  return (
    <div style={{ minHeight:"100vh", background:C.bgDeep, color:C.text, fontFamily:"'Playfair Display',serif", display:"flex" }}>

      {/* ── WRITE KEY BANNER (shown until master key is saved) ── */}
      {showKeyBanner && loggedIn && (
        <div style={{position:"fixed",top:0,left:0,right:0,zIndex:200,background:"#140f00",borderBottom:`2px solid ${C.gold}`,padding:"10px 20px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <span style={{fontSize:10,letterSpacing:"0.2em",color:C.gold,textTransform:"uppercase",whiteSpace:"nowrap"}}>⚠ Write Key Required</span>
          <span style={{fontSize:11,color:C.muted,flex:1,minWidth:180}}>Paste your JSONbin Master Key to enable live sync. Saved in this browser only — never on GitHub.</span>
          <input id="masterKeyInput" type="password" placeholder="$2a$10$..."
            style={{flex:2,minWidth:200,padding:"6px 10px",background:C.panel,border:`1px solid ${C.border}`,borderRadius:2,color:C.cream,fontFamily:"monospace",fontSize:12,outline:"none"}}
          />
          <button onClick={()=>{ const v=document.getElementById("masterKeyInput")?.value||""; saveWriteKey(v); }}
            style={{padding:"6px 16px",background:C.gold,border:"none",borderRadius:2,color:"#1a1000",fontWeight:700,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",cursor:"pointer",whiteSpace:"nowrap"}}>
            Save Key
          </button>
          <button onClick={()=>setShowKeyBanner(false)}
            style={{padding:"6px 10px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:2,color:C.muted,fontSize:10,cursor:"pointer"}}>
            ✕
          </button>
        </div>
      )}

      {/* ── SIDEBAR ─────────────────────────────────────────── */}
      <div style={{ width:200, background:C.bg, borderRight:`1px solid ${C.border}`, display:"flex", flexDirection:"column", flexShrink:0 }}>
        {/* Logo */}
        <div style={{ padding:"22px 18px 18px", borderBottom:`1px solid ${C.border}` }}>
          <div style={{ fontSize:8, color:C.goldDim, fontFamily:"monospace", letterSpacing:4, marginBottom:4 }}>THE SYNDICATE</div>
          <div style={{ fontSize:14, color:C.cream, fontWeight:"700", letterSpacing:1 }}>Admin Portal</div>
          {saving && <div style={{ fontSize:8, color:C.muted, fontFamily:"monospace", marginTop:4 }}>Saving...</div>}
        </div>

        {/* Nav */}
        <nav style={{ flex:1, padding:"12px 10px" }}>
          {NAV.map(n => (
            <button key={n.id} onClick={()=>setActiveNav(n.id)} style={{
              width:"100%", background:activeNav===n.id?`${C.gold}15`:"transparent",
              border:`1px solid ${activeNav===n.id?C.gold+"44":"transparent"}`,
              borderRadius:6, padding:"9px 12px", marginBottom:3,
              display:"flex", alignItems:"center", gap:10,
              cursor:"pointer", textAlign:"left", transition:"all 0.15s",
            }}>
              <span style={{ fontSize:14, opacity:0.8 }}>{n.icon}</span>
              <span style={{ fontSize:11, color:activeNav===n.id?C.gold:C.muted, fontFamily:"monospace", letterSpacing:0.5 }}>{n.label}</span>
              {n.id==="live" && <span style={{ marginLeft:"auto", width:6, height:6, borderRadius:"50%", background:C.green, boxShadow:`0 0 6px ${C.green}` }} />}
            </button>
          ))}
        </nav>

        {/* User */}
        <div style={{ padding:"14px 18px", borderTop:`1px solid ${C.border}` }}>
          <div style={{ fontSize:10, color:C.cream, marginBottom:2 }}>Admin</div>
          <div style={{ fontSize:9, color:C.muted, fontFamily:"monospace", marginBottom:10 }}>admin@thesyndicate.game</div>
          <Btn onClick={()=>setLoggedIn(false)} size="sm" variant="ghost" full>Sign Out</Btn>
        </div>
      </div>

      {/* ── MAIN CONTENT ─────────────────────────────────────── */}
      <div style={{ flex:1, overflow:"auto", minWidth:0 }}>
        {/* Scenario context bar */}
        {showScenarioBar && scenario && (
          <div style={{ background:C.panel, borderBottom:`1px solid ${C.border}`, padding:"10px 28px", display:"flex", alignItems:"center", gap:14 }}>
            <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2 }}>SCENARIO</div>
            <div style={{ fontSize:13, color:C.cream, fontWeight:"600" }}>{scenario.name}</div>
            <Badge text={scenario.status} color={scenario.status==="active"?C.green:C.amber} />
            <Btn onClick={()=>setActiveNav("scenarios")} size="sm" variant="ghost">Switch</Btn>
          </div>
        )}

        <div style={{ padding:28 }}>
          {activeNav==="scenarios" && (
            <ScenarioManager scenarios={scenarios} onSelect={id=>{setActiveScenId(id);setActiveNav("story");}} onAdd={addScenario} onDelete={deleteScenario} activeId={activeScenId} />
          )}
          {activeNav==="story" && scenario && (
            <StoryEditor scenario={scenario} onChange={updateScenario} />
          )}
          {activeNav==="rounds" && scenario && (
            <RoundEditor rounds={scenario.rounds} onChange={r=>updateScenario({rounds:r})} />
          )}
          {activeNav==="characters" && scenario && (
            <div><SectionHead title="Characters" /><CharacterEditor characters={scenario.characters} onChange={c=>updateScenario({characters:c})} /></div>
          )}
          {activeNav==="clues" && scenario && (
            <div><SectionHead title="Clues & Evidence" /><ClueEditor clues={scenario.clues} characters={scenario.characters} rounds={scenario.rounds} onChange={c=>updateScenario({clues:c})} /></div>
          )}
          {activeNav==="suspects" && scenario && (
            <SuspectsEditor suspects={scenario.suspects} characters={scenario.characters} rounds={scenario.rounds} onChange={s=>updateScenario({suspects:s})} />
          )}
          {activeNav==="players" && scenario && (
            <PlayerAccounts players={scenario.players} characters={scenario.characters} scenario={scenario} onChange={p=>updateScenario({players:p})} />
          )}
          {activeNav==="live" && scenario && (
            <LiveControls scenario={scenario} onToast={(m,t)=>setToast({msg:m,type:t})} />
          )}
          {activeNav==="preview" && scenario && (
            <PreviewMode scenario={scenario} />
          )}
        </div>
      </div>

      {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)} />}
    </div>
  );
}


    // ── Mount app ───────────────────────────────────────────────
    const rootEl = document.getElementById("root");
    const root = ReactDOM.createRoot(rootEl);
    root.render(React.createElement(AdminPortal));

    // Hide loader once React renders
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const loader = document.getElementById("loader");
        if (loader) {
          loader.classList.add("hidden");
          setTimeout(() => loader.remove(), 500);
        }
      });
    });
  </script>

</body>
</html>
