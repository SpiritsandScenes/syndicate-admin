// ── Utilities ─────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2,9); }
function fmtDate(d) { return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); }

// ── Small reusable UI atoms ───────────────────────────────────────
function Badge({ text, color=C.gold, small=false }) {
  return (
    <span style={{ background:`${color}18`, border:`1px solid ${color}44`, color,
      fontSize:small?8:9, fontFamily:"monospace", letterSpacing:1.2,
      padding:small?"1px 5px":"2px 8px", borderRadius:2, textTransform:"uppercase", whiteSpace:"nowrap" }}>
      {text}
    </span>
  );
}

function Btn({ children, onClick, variant="primary", size="md", disabled=false, full=false }) {
  const bg = {
    primary: `linear-gradient(135deg, ${C.gold}, #A87830)`,
    danger:  `linear-gradient(135deg, ${C.red}, #8A1A0A)`,
    ghost:   "transparent",
    subtle:  C.faint,
  }[variant];
  const col = variant==="ghost" ? C.muted : variant==="subtle" ? C.text : C.bg;
  const border = variant==="ghost" ? `1px solid ${C.border}` : variant==="subtle" ? `1px solid ${C.borderLt}` : "none";
  const pad = size==="sm" ? "5px 12px" : size==="lg" ? "12px 28px" : "8px 18px";
  return (
    <button onClick={onClick} disabled={disabled} style={{
      background: disabled ? C.faint : bg, border, color: disabled ? C.muted : col,
      fontSize: size==="sm"?10:12, fontFamily:"monospace", letterSpacing:1.2,
      padding:pad, borderRadius:4, cursor:disabled?"not-allowed":"pointer",
      fontWeight:"bold", width:full?"100%":undefined, transition:"opacity 0.15s",
      opacity: disabled ? 0.5 : 1,
    }}>{children}</button>
  );
}

function Input({ value, onChange, placeholder, multiline=false, rows=3, label, hint }) {
  const shared = {
    width:"100%", background:C.bg, border:`1px solid ${C.border}`,
    borderRadius:4, padding:"9px 12px", color:C.text,
    fontSize:12, fontFamily:"monospace",
    outline:"none", resize:"vertical", boxSizing:"border-box",
    transition:"border-color 0.15s",
  };
  return (
    <div style={{ marginBottom:14 }}>
      {label && <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:5 }}>{label.toUpperCase()}</div>}
      {multiline
        ? <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={shared} />
        : <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={shared} />
      }
      {hint && <div style={{ fontSize:10, color:C.muted, marginTop:4 }}>{hint}</div>}
    </div>
  );
}

function Select({ value, onChange, options, label }) {
  return (
    <div style={{ marginBottom:14 }}>
      {label && <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:5 }}>{label.toUpperCase()}</div>}
      <select value={value} onChange={e=>onChange(e.target.value)} style={{
        width:"100%", background:C.bg, border:`1px solid ${C.border}`,
        borderRadius:4, padding:"9px 12px", color:C.text,
        fontSize:12, fontFamily:"monospace", outline:"none",
      }}>
        {options.map(o => <option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}
      </select>
    </div>
  );
}

function Card({ children, style={} }) {
  return (
    <div style={{ background:C.panel, border:`1px solid ${C.border}`, borderRadius:8, ...style }}>
      {children}
    </div>
  );
}

function SectionHead({ title, action, actionLabel, actionVariant="primary" }) {
  return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
      <div style={{ fontSize:16, color:C.cream, fontFamily:"'Playfair Display',serif", fontWeight:"700" }}>{title}</div>
      {action && <Btn onClick={action} size="sm" variant={actionVariant}>{actionLabel}</Btn>}
    </div>
  );
}

function EmptyState({ icon, title, body, action, actionLabel }) {
  return (
    <div style={{ textAlign:"center", padding:"48px 24px", color:C.muted }}>
      <div style={{ fontSize:36, marginBottom:12, opacity:0.4 }}>{icon}</div>
      <div style={{ fontSize:14, color:C.text, marginBottom:8 }}>{title}</div>
      <div style={{ fontSize:12, marginBottom:action?20:0, lineHeight:1.6 }}>{body}</div>
      {action && <Btn onClick={action} size="sm">{actionLabel}</Btn>}
    </div>
  );
}

function Toast({ msg, type="success", onClose }) {
  useEffect(() => { const t=setTimeout(onClose,3000); return ()=>clearTimeout(t); }, []);
  return (
    <div style={{
      position:"fixed", bottom:24, right:24, zIndex:9999,
      background:type==="success"?C.greenDim:C.redDim,
      border:`1px solid ${type==="success"?C.green:C.red}`,
      color:type==="success"?C.green:C.red,
      padding:"10px 20px", borderRadius:6, fontFamily:"monospace", fontSize:11,
      letterSpacing:1, boxShadow:"0 4px 20px rgba(0,0,0,0.5)",
      animation:"slideUp 0.3s ease",
    }}>{type==="success"?"✓":  "✕"}  {msg}
      <style>{`@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}`}</style>
    </div>
  );
}

// ROUND EDITOR
// ══════════════════════════════════════════════════════════════════
function RoundEditor({ rounds, onChange }) {
  const [editing, setEditing] = useState(null);
  const [draft, setDraft]     = useState(null);

  function startEdit(r) { setEditing(r.id); setDraft({...r}); }
  function cancelEdit() { setEditing(null); setDraft(null); }
  function saveEdit() {
    onChange(rounds.map(r => r.id===draft.id ? draft : r));
    cancelEdit();
  }
  function addRound() {
    const newR = { id:uid(), round:rounds.length+1, title:"New Round", timing:"0:00–0:00", notes:"" };
    onChange([...rounds, newR]);
    startEdit(newR);
  }
  function deleteRound(id) { onChange(rounds.filter(r=>r.id!==id)); }

  return (
    <div>
      <SectionHead title="Round Structure" action={addRound} actionLabel="+ Add Round" />
      {rounds.length===0 && <EmptyState icon="⏱" title="No rounds yet" body="Add your first round to define the game structure." action={addRound} actionLabel="+ Add Round" />}
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {rounds.map((r,i) => (
          <Card key={r.id} style={{ padding:0, overflow:"hidden" }}>
            {editing===r.id ? (
              <div style={{ padding:20 }}>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                  <Input label="Round Number" value={String(draft.round)} onChange={v=>setDraft({...draft,round:Number(v)})} />
                  <Input label="Timing" value={draft.timing} onChange={v=>setDraft({...draft,timing:v})} placeholder="0:00–0:00" />
                </div>
                <Input label="Title" value={draft.title} onChange={v=>setDraft({...draft,title:v})} />
                <Input label="Host Notes" value={draft.notes} onChange={v=>setDraft({...draft,notes:v})} multiline rows={2} />
                <div style={{ display:"flex", gap:8 }}>
                  <Btn onClick={saveEdit} size="sm">Save</Btn>
                  <Btn onClick={cancelEdit} size="sm" variant="ghost">Cancel</Btn>
                </div>
              </div>
            ) : (
              <div style={{ display:"flex", alignItems:"center", gap:16, padding:"14px 18px" }}>
                <div style={{ width:32, height:32, borderRadius:"50%", background:`${C.gold}18`, border:`1.5px solid ${C.gold}44`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontFamily:"monospace", color:C.gold, fontWeight:"bold", flexShrink:0 }}>{r.round}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:13, color:C.cream, fontWeight:"600", marginBottom:2 }}>{r.title}</div>
                  <div style={{ fontSize:10, color:C.muted, fontFamily:"monospace" }}>{r.timing} {r.notes && `— ${r.notes}`}</div>
                </div>
                <div style={{ display:"flex", gap:8, flexShrink:0 }}>
                  <Btn onClick={()=>startEdit(r)} size="sm" variant="ghost">Edit</Btn>
                  <Btn onClick={()=>deleteRound(r.id)} size="sm" variant="ghost">✕</Btn>
                </div>
              </div>
            )}
          </Card>
        ))}
      </div>
    </div>
  );
}

// CHARACTER EDITOR
// ══════════════════════════════════════════════════════════════════
function CharacterEditor({ characters, onChange }) {
  const [selected, setSelected] = useState(null);
  const [draft, setDraft]       = useState(null);

  function select(c) { setSelected(c.id); setDraft({...c}); }
  function save() {
    onChange(characters.map(c => c.id===draft.id ? draft : c));
    setDraft({...draft});
  }
  function addChar() {
    const c = { id:uid(), name:"New Character", avatar:"NC", role:"CIVILIAN", roleColor:C.green, position:"", alibi:"", objective:"", secret:"" };
    onChange([...characters, c]);
    select(c);
  }
  function deleteChar(id) {
    onChange(characters.filter(c=>c.id!==id));
    if (selected===id) { setSelected(null); setDraft(null); }
  }

  return (
    <div style={{ display:"grid", gridTemplateColumns:"240px 1fr", gap:16, minHeight:500 }}>
      {/* Left list */}
      <div>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
          <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2 }}>CHARACTERS ({characters.length})</div>
          <Btn onClick={addChar} size="sm">+</Btn>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
          {characters.map(c => (
            <div key={c.id} onClick={()=>select(c)} style={{
              background: selected===c.id ? `${C.gold}18` : C.panel,
              border:`1px solid ${selected===c.id?C.gold+"55":C.border}`,
              borderRadius:6, padding:"10px 12px", cursor:"pointer",
              display:"flex", alignItems:"center", gap:10, transition:"all 0.15s",
            }}>
              <div style={{ width:30, height:30, borderRadius:"50%", background:`${ROLE_COLORS[c.role]||C.green}22`, border:`1.5px solid ${ROLE_COLORS[c.role]||C.green}55`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, color:C.cream, flexShrink:0 }}>{c.avatar}</div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:11, color:C.cream, fontWeight:"600", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{c.name}</div>
                <Badge text={c.role} color={ROLE_COLORS[c.role]||C.green} small />
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Right editor */}
      {draft ? (
        <Card style={{ padding:22 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
            <div style={{ fontSize:14, color:C.cream, fontWeight:"700" }}>{draft.name||"New Character"}</div>
            <Btn onClick={()=>deleteChar(draft.id)} size="sm" variant="danger">Delete</Btn>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            <Input label="Full Name" value={draft.name} onChange={v=>setDraft({...draft,name:v})} />
            <Input label="Avatar (2 letters)" value={draft.avatar} onChange={v=>setDraft({...draft,avatar:v.slice(0,2).toUpperCase()})} />
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            <Select label="Role" value={draft.role} onChange={v=>setDraft({...draft,role:v,roleColor:ROLE_COLORS[v]||C.green})} options={ROLE_TYPES.map(r=>({value:r,label:r}))} />
            <Input label="Position / Title" value={draft.position} onChange={v=>setDraft({...draft,position:v})} />
          </div>
          <Input label="Alibi" value={draft.alibi} onChange={v=>setDraft({...draft,alibi:v})} multiline rows={2} hint="What this character tells others about their whereabouts" />
          <Input label="Objective" value={draft.objective} onChange={v=>setDraft({...draft,objective:v})} multiline rows={2} hint="Shown only to the player — their goal for the evening" />
          <Input label="Secret" value={draft.secret} onChange={v=>setDraft({...draft,secret:v})} multiline rows={2} hint="Hidden behind tap-to-reveal in the player app" />
          <Btn onClick={save} full>Save Character</Btn>
        </Card>
      ) : (
        <Card style={{ display:"flex", alignItems:"center", justifyContent:"center" }}>
          <EmptyState icon="🎭" title="Select a character" body="Choose a character from the list to edit their details." />
        </Card>
      )}
    </div>
  );
}

const TYPE_COLORS = { dispatch:C.gold, evidence:C.red, private:C.purp, tip:"#608060", final:C.amber };

function ImageUploader({ image, onChange }) {
  const [dragOver, setDragOver] = useState(false);
  const [error, setError]       = useState("");
  const inputRef = useRef(null);

  function processFile(file) {
    setError("");
    if (!file) return;
    if (!["image/jpeg","image/png","image/jpg"].includes(file.type)) {
      setError("Only JPG and PNG files are accepted."); return;
    }
    if (file.size > 3 * 1024 * 1024) {
      setError(`File too large: ${(file.size/1024/1024).toFixed(1)}MB. Maximum is 3MB.`); return;
    }
    const reader = new FileReader();
    reader.onload = e => onChange({ src: e.target.result, name: file.name, size: file.size, type: file.type });
    reader.readAsDataURL(file);
  }

  function handleDrop(e) {
    e.preventDefault(); setDragOver(false);
    processFile(e.dataTransfer.files[0]);
  }

  const fmtSize = bytes => bytes < 1024*1024 ? `${(bytes/1024).toFixed(0)}KB` : `${(bytes/1024/1024).toFixed(1)}MB`;

  return (
    <div style={{ marginBottom:16 }}>
      <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:5 }}>EVIDENCE IMAGE</div>
      <div style={{ fontSize:10, color:C.muted, marginBottom:10 }}>JPG or PNG, max 3MB. Shown to players below the clue text when they receive this evidence.</div>

      {image?.src ? (
        // ── Image preview ───────────────────────────────────────
        <div style={{ border:`1px solid ${C.gold}44`, borderRadius:6, overflow:"hidden", background:C.bg }}>
          {/* Aged paper / vignette overlay effect */}
          <div style={{ position:"relative" }}>
            <img src={image.src} alt={image.name} style={{ width:"100%", maxHeight:240, objectFit:"cover", display:"block", filter:"sepia(20%) contrast(1.05)" }} />
            <div style={{ position:"absolute", inset:0, background:"radial-gradient(ellipse at center, transparent 50%, rgba(8,7,10,0.5) 100%)", pointerEvents:"none" }} />
            <div style={{ position:"absolute", top:8, right:8, display:"flex", gap:6 }}>
              <div style={{ background:"rgba(8,7,10,0.75)", border:`1px solid ${C.border}`, borderRadius:3, padding:"3px 8px", fontSize:9, color:C.gold, fontFamily:"monospace", letterSpacing:1 }}>
                {fmtSize(image.size)}
              </div>
            </div>
          </div>
          <div style={{ padding:"10px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", borderTop:`1px solid ${C.border}` }}>
            <div>
              <div style={{ fontSize:11, color:C.cream, marginBottom:1 }}>{image.name}</div>
              <div style={{ fontSize:9, color:C.muted, fontFamily:"monospace" }}>{image.type} · {fmtSize(image.size)}</div>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <Btn onClick={()=>inputRef.current?.click()} size="sm" variant="ghost">Replace</Btn>
              <Btn onClick={()=>onChange(null)} size="sm" variant="danger">Remove</Btn>
            </div>
          </div>
        </div>
      ) : (
        // ── Drop zone ──────────────────────────────────────────
        <div
          onClick={()=>inputRef.current?.click()}
          onDragOver={e=>{e.preventDefault();setDragOver(true);}}
          onDragLeave={()=>setDragOver(false)}
          onDrop={handleDrop}
          style={{
            border:`2px dashed ${dragOver?C.gold:C.border}`,
            borderRadius:6, padding:"28px 20px", textAlign:"center",
            cursor:"pointer", background:dragOver?`${C.gold}08`:C.bg,
            transition:"all 0.2s",
          }}
        >
          <div style={{ fontSize:28, marginBottom:10, opacity:0.4 }}>🖼</div>
          <div style={{ fontSize:12, color:C.text, marginBottom:4 }}>Drop image here or click to browse</div>
          <div style={{ fontSize:10, color:C.muted, fontFamily:"monospace" }}>JPG · PNG · Max 3MB</div>
        </div>
      )}

      {error && (
        <div style={{ marginTop:8, padding:"7px 12px", background:C.redDim, border:`1px solid ${C.red}44`, borderRadius:4, fontSize:11, color:C.red, fontFamily:"monospace" }}>
          ✕  {error}
        </div>
      )}

      <input ref={inputRef} type="file" accept="image/jpeg,image/png" style={{ display:"none" }}
        onChange={e=>processFile(e.target.files[0])} />
    </div>
  );
}

function ClueEditor({ clues, characters, rounds, onChange }) {
  const [selected, setSelected] = useState(null);
  const [draft, setDraft]       = useState(null);
  const [filterRound, setFilterRound] = useState("all");
  const [filterType,  setFilterType]  = useState("all");
  const [imgExpanded, setImgExpanded] = useState(false);

  function select(c) { setSelected(c.id); setDraft({...c, chars:[...c.chars]}); setImgExpanded(false); }
  function save() {
    onChange(clues.map(c => c.id===draft.id ? draft : c));
    setDraft({...draft});
  }
  function addClue() {
    const c = { id:uid(), round:1, type:"evidence", time:"9:00 PM", title:"New Clue", text:"", private:false, chars:[], image:null };
    onChange([...clues, c]);
    select(c);
  }
  function deleteClue(id) {
    onChange(clues.filter(c=>c.id!==id));
    if (selected===id) { setSelected(null); setDraft(null); }
  }
  function toggleChar(cid) {
    const list = draft.chars.includes(cid) ? draft.chars.filter(x=>x!==cid) : [...draft.chars,cid];
    setDraft({...draft, chars:list});
  }

  const visible = clues.filter(c =>
    (filterRound==="all" || String(c.round)===filterRound) &&
    (filterType==="all"  || c.type===filterType)
  );

  return (
    <div style={{ display:"grid", gridTemplateColumns:"300px 1fr", gap:16, minHeight:500 }}>
      {/* Left */}
      <div>
        <div style={{ display:"flex", gap:6, marginBottom:10 }}>
          <select value={filterRound} onChange={e=>setFilterRound(e.target.value)} style={{ flex:1, background:C.bg, border:`1px solid ${C.border}`, color:C.text, borderRadius:4, padding:"6px 8px", fontSize:10, fontFamily:"monospace" }}>
            <option value="all">All Rounds</option>
            {rounds.map(r=><option key={r.id} value={String(r.round)}>Round {r.round}</option>)}
          </select>
          <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{ flex:1, background:C.bg, border:`1px solid ${C.border}`, color:C.text, borderRadius:4, padding:"6px 8px", fontSize:10, fontFamily:"monospace" }}>
            <option value="all">All Types</option>
            {CLUE_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
          <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2 }}>{visible.length} CLUES</div>
          <Btn onClick={addClue} size="sm">+</Btn>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:5, maxHeight:560, overflowY:"auto" }}>
          {visible.map(c => {
            const tc = TYPE_COLORS[c.type]||C.gold;
            return (
              <div key={c.id} onClick={()=>select(c)} style={{
                background:selected===c.id?`${tc}10`:C.panel,
                border:`1px solid ${selected===c.id?tc+"44":C.border}`,
                borderLeft:`3px solid ${tc}`,
                borderRadius:"0 6px 6px 0",
                cursor:"pointer", transition:"all 0.15s",
                overflow:"hidden",
              }}>
                {/* Thumbnail strip if image exists */}
                {c.image?.src && (
                  <div style={{ height:52, overflow:"hidden", position:"relative" }}>
                    <img src={c.image.src} alt="" style={{ width:"100%", height:"100%", objectFit:"cover", filter:"sepia(30%) brightness(0.7)" }} />
                    <div style={{ position:"absolute", inset:0, background:`linear-gradient(to right, ${tc}22, transparent)` }} />
                    <div style={{ position:"absolute", bottom:4, right:6, fontSize:8, color:C.gold, fontFamily:"monospace", background:"rgba(8,7,10,0.7)", padding:"1px 5px", borderRadius:2 }}>IMG</div>
                  </div>
                )}
                <div style={{ padding:"9px 12px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                    <Badge text={c.type} color={tc} small />
                    <span style={{ fontSize:9, color:C.muted, fontFamily:"monospace" }}>R{c.round} · {c.time}</span>
                  </div>
                  <div style={{ fontSize:11, color:C.cream, fontWeight:"600", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{c.title}</div>
                  {c.private && <div style={{ fontSize:9, color:C.purp, fontFamily:"monospace", marginTop:2 }}>🔒 {c.chars.length} recipient{c.chars.length!==1?"s":""}</div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Right */}
      {draft ? (

// SUSPECTS EDITOR
// ══════════════════════════════════════════════════════════════════
function SuspectsEditor({ suspects, characters, rounds, onChange }) {
  function toggleElim(id) {
    onChange(suspects.map(s => s.id===id ? {...s, eliminated:!s.eliminated, eliminatedRound:s.eliminated?null:s.eliminatedRound} : s));
  }
  function setRound(id, val) {
    onChange(suspects.map(s => s.id===id ? {...s, eliminatedRound:val?Number(val):null} : s));
  }

  return (
    <div>
      <SectionHead title="Suspects & Eliminations" />
      <div style={{ marginBottom:16, padding:"10px 14px", background:C.panelLt, border:`1px solid ${C.border}`, borderRadius:6, fontSize:11, color:C.muted, fontFamily:"monospace" }}>
        Mark eliminations and assign rounds. This controls which players appear as active or crossed-out in the player app.
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:10 }}>
        {suspects.map(s => {
          const char = characters.find(c=>c.id===s.charId);
          if (!char) return null;
          return (
            <Card key={s.id} style={{ padding:14, opacity:s.eliminated?0.7:1, borderColor:s.eliminated?C.red+"33":C.border }}>
              <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:s.eliminated?12:0 }}>
                <div style={{ width:36, height:36, borderRadius:"50%", background:`${ROLE_COLORS[char.role]||C.green}22`, border:`1.5px solid ${ROLE_COLORS[char.role]||C.green}44`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, color:C.cream, flexShrink:0 }}>{char.avatar}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:12, color:C.cream, fontWeight:"600" }}>{char.name}</div>
                  <div style={{ fontSize:10, color:C.muted, fontFamily:"monospace" }}>{char.position}</div>
                </div>
                <div onClick={()=>toggleElim(s.id)} style={{
                  width:32, height:18, borderRadius:9, background:s.eliminated?C.red:C.faint,
                  position:"relative", cursor:"pointer", transition:"background 0.2s", flexShrink:0,
                }}>
                  <div style={{ position:"absolute", top:3, left:s.eliminated?17:3, width:12, height:12, borderRadius:"50%", background:C.white, transition:"left 0.2s" }} />
                </div>
              </div>
              {s.eliminated && (
                <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:10 }}>
                  <Badge text="ELIMINATED" color={C.red} small />
                  <select value={s.eliminatedRound||""} onChange={e=>setRound(s.id,e.target.value)} style={{ flex:1, background:C.bg, border:`1px solid ${C.red}44`, color:C.red, borderRadius:3, padding:"3px 6px", fontSize:10, fontFamily:"monospace" }}>
                    <option value="">Round?</option>
                    {rounds.map(r=><option key={r.id} value={r.round}>Round {r.round}</option>)}
                  </select>
                </div>
              )}
            </Card>
          );
        })}
      </div>
    </div>
  );
}

// ── QR Code generator (pure JS, no library needed) ──────────────
// Encodes text into a QR-like SVG using a simple matrix approach.
// For demo: generates a deterministic pixel grid from the string hash.
// ── Real QR Code using qrcode library via canvas ─────────────────
// Loads qrcode from CDN as a side-effect, generates actual scannable QR
// ── Pure-JS QR Code generator (no external library) ──────────────
// Implements full QR spec: Reed-Solomon ECC, byte mode encoding,
// finder/timing/alignment/format patterns, zigzag placement, masking.
function buildQRMatrix(text) {
  // GF(256) lookup tables
  const EXP=new Uint8Array(512), LOG=new Uint8Array(256);
  let gx=1;
  for(let i=0;i<255;i++){ EXP[i]=gx; LOG[gx]=i; gx<<=1; if(gx&256)gx^=285; }
  for(let i=255;i<512;i++) EXP[i]=EXP[i-255];
  const gmul=(a,b)=>a&&b?EXP[LOG[a]+LOG[b]]:0;

  function genpoly(n){ let p=[1]; for(let i=0;i<n;i++){ const q=[1,EXP[i]]; const r=new Array(p.length+q.length-1).fill(0); for(let a=0;a<p.length;a++) for(let b=0;b<q.length;b++) r[a+b]^=gmul(p[a],q[b]); p=r; } return p; }
  function rsencode(data,n){ const gen=genpoly(n); const d=new Uint8Array(data.length+n); d.set(data); for(let i=0;i<data.length;i++){ const c=d[i]; if(c) for(let j=0;j<gen.length;j++) d[i+j]^=gmul(gen[j],c); } return d.slice(data.length); }

  // Byte-mode data
  const bytes=[]; for(let i=0;i<text.length;i++) bytes.push(text.charCodeAt(i)&0xFF);
  const len=bytes.length;

  // Version config (ECC level M): N=matrix size, totalDC=data codewords,
  // ecpb=ECC codewords/block, nb1/dc1=blocks of size dc1, nb2/dc2=blocks of size dc2
  const VCFG=[null,
    {N:21,totalDC:16,ecpb:10,nb1:1,dc1:16,nb2:0,dc2:0},
    {N:25,totalDC:28,ecpb:16,nb1:1,dc1:28,nb2:0,dc2:0},
    {N:29,totalDC:44,ecpb:26,nb1:1,dc1:44,nb2:0,dc2:0},
    {N:33,totalDC:64,ecpb:18,nb1:2,dc1:32,nb2:0,dc2:0},
    {N:37,totalDC:86,ecpb:24,nb1:2,dc1:43,nb2:0,dc2:0},
    {N:41,totalDC:108,ecpb:16,nb1:2,dc1:27,nb2:2,dc2:28},
    {N:45,totalDC:124,ecpb:18,nb1:4,dc1:31,nb2:0,dc2:0},
  ];
  // Max data bytes per version at ECC-M
  const CAPS=[0,6,11,22,36,50,66,81];
  let version=1; while(version<7 && CAPS[version]<len+3) version++;
  if(version>7) throw new Error("Text too long");
  const cfg=VCFG[version];

  // Build bit stream
  const bits=[];
  const pn=(v,l)=>{ for(let i=l-1;i>=0;i--) bits.push((v>>i)&1); };
  pn(0b0100,4); pn(len,8); bytes.forEach(b=>pn(b,8));
  for(let i=0;i<4&&bits.length<cfg.totalDC*8;i++) bits.push(0);
  while(bits.length%8) bits.push(0);
  const dc=[]; for(let i=0;i<bits.length;i+=8){ let b=0; for(let j=0;j<8;j++) b=(b<<1)|(bits[i+j]||0); dc.push(b); }
  const PAD=[236,17]; let pi=0; while(dc.length<cfg.totalDC) dc.push(PAD[pi++%2]);

  // Build data/ECC blocks and interleave
  const dataBlocks=[], eccBlocks=[]; let pos=0;
  for(let i=0;i<cfg.nb1;i++){ dataBlocks.push(dc.slice(pos,pos+cfg.dc1)); pos+=cfg.dc1; }
  for(let i=0;i<cfg.nb2;i++){ dataBlocks.push(dc.slice(pos,pos+cfg.dc2)); pos+=cfg.dc2; }
  dataBlocks.forEach(b=>eccBlocks.push(rsencode(new Uint8Array(b),cfg.ecpb)));
  const final=[]; const maxDC=Math.max(cfg.dc1,cfg.dc2||0);
  for(let i=0;i<maxDC;i++) dataBlocks.forEach(b=>{ if(i<b.length) final.push(b[i]); });
  for(let i=0;i<cfg.ecpb;i++) eccBlocks.forEach(b=>final.push(b[i]));
  const finalBits=[]; final.forEach(b=>{ for(let i=7;i>=0;i--) finalBits.push((b>>i)&1); });
  const REM=[0,0,7,7,7,7,7,0]; for(let i=0;i<(REM[version]||0);i++) finalBits.push(0);

  // Build matrix (null=empty, -1=reserved format, 0=light, 1=dark)
  const SZ=cfg.N;
  const MAT=Array.from({length:SZ},()=>new Array(SZ).fill(null));
  const setM=(r,c,v)=>{ if(r>=0&&r<SZ&&c>=0&&c<SZ&&MAT[r][c]===null) MAT[r][c]=v; };
  const setF=(r,c,v)=>{ if(r>=0&&r<SZ&&c>=0&&c<SZ) MAT[r][c]=v; };

  // Finder pattern + separator
  function drawFinder(tr,tc){
    for(let r=0;r<7;r++) for(let c=0;c<7;c++)
      setF(tr+r,tc+c,(r===0||r===6||c===0||c===6||(r>=2&&r<=4&&c>=2&&c<=4))?1:0);
    for(let k=-1;k<=7;k++){ setM(tr+7,tc+k,0); setM(tr-1,tc+k,0); setM(tr+k,tc+7,0); setM(tr+k,tc-1,0); }
  }
  drawFinder(0,0); drawFinder(0,SZ-7); drawFinder(SZ-7,0);

  // Timing strips
  for(let i=8;i<SZ-8;i++){ setM(6,i,i%2===0?1:0); setM(i,6,i%2===0?1:0); }

  // Dark module
  setM(SZ-8,8,1);

  // Alignment patterns
  const APOS={2:[6,18],3:[6,22],4:[6,26],5:[6,30],6:[6,34],7:[6,22,38]};
  if(version>=2){
    const pts=APOS[version];
    for(let ai=0;ai<pts.length;ai++) for(let aj=0;aj<pts.length;aj++){
      const r=pts[ai],c=pts[aj];
      if(MAT[r][c]!==null) continue;
      for(let dr=-2;dr<=2;dr++) for(let dc2=-2;dc2<=2;dc2++)
        setF(r+dr,c+dc2,(Math.abs(dr)===2||Math.abs(dc2)===2||(dr===0&&dc2===0))?1:0);
    }
  }

  // Reserve format info areas
  for(let i=0;i<=8;i++){ if(MAT[8][i]===null) MAT[8][i]=-1; if(MAT[i][8]===null) MAT[i][8]=-1; }
  for(let i=0;i<8;i++){ if(MAT[SZ-1-i][8]===null) MAT[SZ-1-i][8]=-1; if(MAT[8][SZ-1-i]===null) MAT[8][SZ-1-i]=-1; }

  // Mask functions
  const MASKS=[
    (r,c)=>(r+c)%2===0,(r,c)=>r%2===0,(r,c)=>c%3===0,(r,c)=>(r+c)%3===0,
    (r,c)=>(Math.floor(r/2)+Math.floor(c/3))%2===0,(r,c)=>(r*c)%2+(r*c)%3===0,
    (r,c)=>((r*c)%2+(r*c)%3)%2===0,(r,c)=>((r+c)%2+(r*c)%3)%2===0,
  ];

  // Zigzag data placement (correct upward/downward direction per column pair)
  function placeData(maskFn){
    const tmp=MAT.map(r=>[...r]);
    let bi=0, goUp=true, col=SZ-1;
    while(col>=1){
      if(col===6) col--;
      for(let vi=0;vi<SZ;vi++){
        const r=goUp?SZ-1-vi:vi;
        for(let dx=0;dx<2;dx++){
          const c=col-dx;
          if(c<0||c>=SZ||tmp[r][c]!==null) continue;
          const bit=bi<finalBits.length?finalBits[bi++]:0;
          tmp[r][c]=bit^(maskFn(r,c)?1:0);
        }
      }
      goUp=!goUp; col-=2;
    }
    return tmp;
  }

  // Penalty scoring
  function penalty(mat){
    let p=0;
    for(let r=0;r<SZ;r++){ let run=1; for(let c=1;c<SZ;c++){ if(mat[r][c]===mat[r][c-1]&&mat[r][c]!==null){run++;if(run===5)p+=3;else if(run>5)p++;}else run=1; }}
    for(let c=0;c<SZ;c++){ let run=1; for(let r=1;r<SZ;r++){ if(mat[r][c]===mat[r-1][c]&&mat[r][c]!==null){run++;if(run===5)p+=3;else if(run>5)p++;}else run=1; }}
    for(let r=0;r<SZ-1;r++) for(let c=0;c<SZ-1;c++) if(mat[r][c]!==null&&mat[r][c]===mat[r+1][c]&&mat[r][c]===mat[r][c+1]&&mat[r][c]===mat[r+1][c+1]) p+=3;
    return p;
  }

  let bestMat=null, bestPen=Infinity, bestMaskIdx=0;
  for(let m=0;m<8;m++){ const mat=placeData(MASKS[m]); const pen=penalty(mat); if(pen<bestPen){bestPen=pen;bestMat=mat;bestMaskIdx=m;} }

  // Format info (ECC level M = bits 01)
  const fmtRaw=(0b01<<3)|bestMaskIdx;
  let fmtRem=fmtRaw<<10;
  const FMTPOLY=0b10100110111;
  for(let i=14;i>=10;i--) if(fmtRem&(1<<i)) fmtRem^=FMTPOLY<<(i-10);
  const fmtFull=((fmtRaw<<10)|(fmtRem&0x3FF))^0b101010000010010;
  const fb=(i)=>(fmtFull>>i)&1;
  const FC1=[[8,0],[8,1],[8,2],[8,3],[8,4],[8,5],[8,7],[8,8],[7,8],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8]];
  FC1.forEach(([r,c],i)=>bestMat[r][c]=fb(14-i));
  for(let i=0;i<7;i++) bestMat[SZ-1-i][8]=fb(i);
  for(let i=7;i<15;i++) bestMat[8][SZ-15+i]=fb(i);
  bestMat[SZ-8][8]=1;

  return {matrix:bestMat, size:SZ};
}

function QRCode({ value, size=120, fgColor="#000000", bgColor="#FFFFFF" }) {
  const result = useMemo(()=>{ try{ return buildQRMatrix(value); }catch(e){ return null; }}, [value]);
  if (!result) return <div style={{width:size,height:size,background:bgColor,border:"1px solid #ccc",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:9,fontFamily:"monospace",color:"#999"}}>QR error</span></div>;
  const {matrix,size:N} = result;
  const cell=size/N;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} xmlns="http://www.w3.org/2000/svg" shapeRendering="crispEdges">
      <rect width={size} height={size} fill={bgColor}/>
      {matrix.map((row,r)=>row.map((v,c)=>v===1?<rect key={`${r}-${c}`} x={c*cell} y={r*cell} width={cell+0.5} height={cell+0.5} fill={fgColor}/>:null))}
    </svg>
  );
}

// ── Download invite card as PNG ───────────────────────────────────
function useCardDownload() {
  return useCallback(async (cardEl, filename) => {
    if (!cardEl) return;
    // Dynamically load html2canvas if not present
    if (!window.html2canvas) {
      await new Promise((res, rej) => {
        const s = document.createElement("script");
        s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    const canvas = await window.html2canvas(cardEl, { backgroundColor:null, scale:2, useCORS:true, logging:false });
    const link = document.createElement("a");
    link.download = filename;
    link.href = canvas.toDataURL("image/png");
    link.click();
  }, []);
}

function PrintAllModal({ players, characters, scenario, onClose }) {
  function doPrint() { window.print(); }
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:9000, display:"flex", flexDirection:"column", overflow:"auto" }}>
      <div style={{ background:C.panel, borderBottom:`1px solid ${C.border}`, padding:"14px 24px", display:"flex", alignItems:"center", gap:16, flexShrink:0 }}>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:14, color:C.cream, fontWeight:"700" }}>Print Invite Cards</div>
          <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>{players.length} card{players.length!==1?"s":""} · Print or save as PDF from your browser dialog</div>
        </div>
        <Btn onClick={doPrint}>🖨 Print / Save PDF</Btn>
        <Btn onClick={onClose} variant="ghost">Close</Btn>
      </div>
      <div id="print-area" style={{ padding:32, display:"flex", flexWrap:"wrap", gap:24, justifyContent:"center" }}>
        {players.map(p=>{
          const char=characters.find(c=>c.id===p.character);
          return <InviteCard key={p.id} player={p} char={char} scenario={scenario} forPrint />;

        @media print {

function PlayerAccounts({ players, characters, scenario, onChange }) {
  const [newName, setNewName]       = useState("");
  const [newChar, setNewChar]       = useState("");
  const [viewCard, setViewCard]     = useState(null); // player id
  const [showPrint, setShowPrint]   = useState(false);
  const [view, setView]             = useState("list"); // list | cards
  const [downloading, setDownloading] = useState(null);
  const previewCardRef = useRef(null);
  const downloadCard   = useCardDownload();

  async function handleDownload(player, char) {
    if (!previewCardRef.current) return;
    setDownloading(player.id);
    try {
      await downloadCard(previewCardRef.current, `syndicate-invite-${player.name.replace(/\s+/g,"-").toLowerCase()}.png`);
    } catch(e) {}
    setDownloading(null);
  }

  function addPlayer() {
    if (!newName || !newChar) return;
    const p = { id:uid(), name:newName, code:generateCode(), character:newChar, joined:false, lastSeen:"Never" };
    onChange([...players, p]);
    setNewName(""); setNewChar("");
  }
  function removePlayer(id) {
    onChange(players.filter(p=>p.id!==id));
    if (viewCard===id) setViewCard(null);
  }
  function generateCode() {
    const words = ["MALT","RYES","CORN","MASH","STILL","CASK","WORT","MEAD","HOPS","BURL"];
    return `${words[Math.floor(Math.random()*words.length)]}-${Math.floor(1000+Math.random()*9000)}`;
  }
  function regenerateCode(id) {
    onChange(players.map(p=>p.id===id?{...p,code:generateCode()}:p));
  }

  const selectedPlayer = players.find(p=>p.id===viewCard);
  const selectedChar   = characters.find(c=>c.id===selectedPlayer?.character);

  return (
    <div>
      {showPrint && (
        <PrintAllModal players={players} characters={characters} scenario={scenario} onClose={()=>setShowPrint(false)} />
      )}

      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
        <div style={{ fontSize:16, color:C.cream, fontFamily:"'Playfair Display',serif", fontWeight:"700" }}>Players & Invite Cards</div>
        <div style={{ display:"flex", gap:8 }}>
          {/* View toggle */}
          <div style={{ display:"flex", background:C.panel, border:`1px solid ${C.border}`, borderRadius:4, overflow:"hidden" }}>
            {["list","cards"].map(v=>(
              <button key={v} onClick={()=>setView(v)} style={{ padding:"6px 14px", background:view===v?`${C.gold}22`:"transparent", border:"none", color:view===v?C.gold:C.muted, fontSize:10, fontFamily:"monospace", letterSpacing:1, cursor:"pointer", textTransform:"uppercase" }}>{v}</button>
            ))}
          </div>
          {players.length>0 && <Btn onClick={()=>setShowPrint(true)} variant="ghost" size="sm">🖨 Print All Cards</Btn>}
        </div>
      </div>

      {/* Add player form */}
      <Card style={{ padding:18, marginBottom:20 }}>
        <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:14 }}>ADD PLAYER</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr auto", gap:12, alignItems:"end" }}>
          <Input label="Player Name" value={newName} onChange={setNewName} placeholder="Sarah Chen" />
          <div>
            <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:5 }}>ASSIGN CHARACTER</div>
            <select value={newChar} onChange={e=>setNewChar(e.target.value)} style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, color:C.text, borderRadius:4, padding:"9px 12px", fontSize:12, fontFamily:"monospace", outline:"none" }}>
              <option value="">Select...</option>
              {characters.map(c=><option key={c.id} value={c.id}>{c.name} ({c.role})</option>)}
            </select>
          </div>
          <div style={{ marginBottom:14 }}>
            <Btn onClick={addPlayer} disabled={!newName||!newChar}>Add Player</Btn>
          </div>
        </div>
      </Card>

      {players.length===0 && (
        <EmptyState icon="👥" title="No players yet" body="Add players above and assign each one a character. Each player gets a unique QR code and game code for their invite card." />
      )}

      {/* ── CARD VIEW ─────────────────────────────────────────── */}
      {view==="cards" && players.length>0 && (
        <div style={{ display:"flex", flexWrap:"wrap", gap:20 }}>
          {players.map(p=>{
            const char=characters.find(c=>c.id===p.character);
            const cardElRef = { current: null };
            return (
              <div key={p.id}>
                <InviteCard player={p} char={char} scenario={scenario} cardRef={el=>{ cardElRef.current=el; }} />
                <div style={{ display:"flex", gap:6, marginTop:8, justifyContent:"center" }}>
                  <Btn onClick={()=>{ downloading===p.id?null:( setDownloading(p.id), downloadCard(cardElRef.current, `syndicate-invite-${p.name.replace(/\s+/g,"-").toLowerCase()}.png`).finally(()=>setDownloading(null)) ); }} size="sm" disabled={downloading===p.id}>
                    {downloading===p.id?"Saving...":"⬇ PNG"}
                  </Btn>
                  <Btn onClick={()=>regenerateCode(p.id)} size="sm" variant="ghost">↻ Code</Btn>
                  <Btn onClick={()=>removePlayer(p.id)} size="sm" variant="danger">✕</Btn>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── LIST VIEW ─────────────────────────────────────────── */}
      {view==="list" && players.length>0 && (
        <div style={{ display:"grid", gridTemplateColumns: viewCard?"1fr 320px":"1fr", gap:16 }}>
          {/* Player list */}
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {players.map(p => {
              const char = characters.find(c=>c.id===p.character);
              const isSelected = viewCard===p.id;
              return (
                <Card key={p.id} style={{ padding:"12px 16px", border:`1px solid ${isSelected?C.gold+"44":C.border}`, cursor:"pointer", transition:"border-color 0.15s" }}
                  onClick={()=>setViewCard(isSelected?null:p.id)}>
                  <div style={{ display:"flex", alignItems:"center", gap:14 }}>
                    {/* QR thumbnail */}
                    <div style={{ width:44, height:44, background:"#07040A", border:`1px solid ${C.border}`, borderRadius:4, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, overflow:"hidden" }}>
                      <QRCode value={`${window.location.origin}${window.location.pathname.replace(/\/index\.html$/,"").replace(/\/?$/,"")}/join/?code=${p.code}`} size={40} fgColor={C.gold} bgColor="#07040A" />
                    </div>
                    {/* Avatar */}
                    <div style={{ width:36, height:36, borderRadius:"50%", background:`${char?ROLE_COLORS[char.role]:C.gold}22`, border:`1.5px solid ${char?ROLE_COLORS[char.role]:C.gold}44`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, color:C.cream, fontWeight:"bold", flexShrink:0 }}>
                      {char?.avatar||"?"}
                    </div>
                    {/* Name + char */}
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:13, color:C.cream, fontWeight:"600", marginBottom:2 }}>{p.name}</div>
                      <div style={{ fontSize:10, color:C.muted, fontFamily:"monospace" }}>
                        {char?.name||"Unassigned"}
                        {char && <span style={{ marginLeft:6 }}><Badge text={char.role} color={ROLE_COLORS[char.role]||C.green} small /></span>}
                      </div>
                    </div>
                    {/* Code */}
                    <div style={{ textAlign:"center", padding:"5px 10px", background:C.panelLt, border:`1px solid ${C.border}`, borderRadius:4 }}>
                      <div style={{ fontSize:7, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:1 }}>CODE</div>
                      <div style={{ fontSize:13, color:C.gold, fontFamily:"monospace", fontWeight:"bold", letterSpacing:2 }}>{p.code}</div>
                    </div>
                    {/* Status dot */}
                    <div style={{ textAlign:"center", minWidth:52 }}>
                      <div style={{ width:8, height:8, borderRadius:"50%", background:p.joined?C.green:C.faint, margin:"0 auto 3px", boxShadow:p.joined?`0 0 6px ${C.green}`:undefined }} />
                      <div style={{ fontSize:8, color:p.joined?C.green:C.muted, fontFamily:"monospace" }}>{p.joined?"ONLINE":"OFFLINE"}</div>
                    </div>
                    {/* Actions */}
                    <div style={{ display:"flex", gap:6 }} onClick={e=>e.stopPropagation()}>
                      <Btn onClick={()=>regenerateCode(p.id)} size="sm" variant="ghost" title="Generate new code">↻</Btn>
                      <Btn onClick={()=>removePlayer(p.id)} size="sm" variant="ghost">✕</Btn>
                    </div>
                  </div>
                </Card>
              );
            })}
          </div>

          {/* Invite card preview panel */}
          {viewCard && selectedPlayer && (
            <div style={{ position:"sticky", top:0, alignSelf:"start" }}>
              <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:10, textAlign:"center" }}>INVITE CARD PREVIEW</div>
              <div style={{ display:"flex", justifyContent:"center" }}>
                <InviteCard player={selectedPlayer} char={selectedChar} scenario={scenario} cardRef={previewCardRef} />
              </div>
              <div style={{ display:"flex", gap:6, marginTop:10, justifyContent:"center" }}>
                <Btn onClick={()=>handleDownload(selectedPlayer, selectedChar)} size="sm" disabled={downloading===selectedPlayer.id}>
                  {downloading===selectedPlayer.id ? "Saving..." : "⬇ Save PNG"}
                </Btn>
                <Btn onClick={()=>setShowPrint(true)} size="sm" variant="ghost">🖨 Print All</Btn>
                <Btn onClick={()=>regenerateCode(selectedPlayer.id)} size="sm" variant="ghost">↻ New Code</Btn>
              </div>
              <div style={{ marginTop:10, padding:"8px 12px", background:C.panelLt, border:`1px solid ${C.border}`, borderRadius:4, fontSize:10, color:C.muted, fontFamily:"monospace", lineHeight:1.6, textAlign:"center" }}>
                QR scans to:<br/>
                <span style={{ color:C.gold, wordBreak:"break-all", fontSize:9 }}>
                  {window.location.hostname}/join?code={selectedPlayer.code}
                </span>
              </div>
              <div style={{ marginTop:8, padding:"6px 12px", background:C.greenDim, border:`1px solid ${C.green}33`, borderRadius:4, fontSize:9, color:C.green, fontFamily:"monospace", textAlign:"center", lineHeight:1.6 }}>

// LIVE GAME CONTROLS
// ══════════════════════════════════════════════════════════════════
function LiveControls({ scenario, onToast }) {
  const [round, setRound]           = useState(3);
  const [phase, setPhase]           = useState("interrogation");
  const [timer, setTimer]           = useState(420);
  const [timerOn, setTimerOn]       = useState(false);
  const [votedCount, setVotedCount] = useState(4);
  const [sentClues, setSentClues]   = useState(new Set());

  useEffect(() => {
    if (!timerOn || timer<=0) return;
    const t = setInterval(()=>setTimer(x=>x-1),1000);
    return ()=>clearInterval(t);
  },[timerOn,timer]);

  const fmt = s=>`${Math.floor(s/60).toString().padStart(2,"0")}:${(s%60).toString().padStart(2,"0")}`;
  const activeCount = scenario.suspects.filter(s=>!s.eliminated).length;
  const roundClues = scenario.clues.filter(c=>c.round===round);
  const timerCol = timer<60?C.red:timer<120?C.amber:C.cream;

  function sendClue(id) {
    setSentClues(s=>new Set([...s,id]));
    const c = scenario.clues.find(x=>x.id===id);
    onToast(`Sent: "${c?.title}"`, "success");
  }

  return (
    <div>
      <SectionHead title="Live Game Controls" />
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:14, marginBottom:14 }}>

        {/* Timer */}
        <Card style={{ padding:18, textAlign:"center" }}>
          <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:12 }}>ROUND TIMER</div>
          <div style={{ fontSize:48, fontFamily:"monospace", fontWeight:"bold", color:timerCol, lineHeight:1, marginBottom:4, textShadow:timer<60?`0 0 20px ${C.red}`:undefined }}>{fmt(timer)}</div>
          <div style={{ height:4, background:C.faint, borderRadius:2, marginBottom:14, overflow:"hidden" }}>
            <div style={{ height:"100%", background:`linear-gradient(90deg,${C.gold},#A87830)`, width:`${(timer/600)*100}%`, borderRadius:2, transition:"width 1s linear" }} />
          </div>
          <div style={{ display:"flex", gap:6, justifyContent:"center" }}>
            <Btn onClick={()=>setTimerOn(x=>!x)} size="sm" variant={timerOn?"danger":"primary"}>{timerOn?"PAUSE":"START"}</Btn>
            <Btn onClick={()=>{setTimer(600);setTimerOn(false);}} size="sm" variant="ghost">RESET</Btn>
          </div>
        </Card>

        {/* Round control */}
        <Card style={{ padding:18 }}>
          <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:12 }}>ROUND CONTROL</div>
          <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:14 }}>
            <Btn onClick={()=>setRound(r=>Math.max(1,r-1))} size="sm" variant="ghost">‹</Btn>
            <div style={{ flex:1, textAlign:"center" }}>
              <div style={{ fontSize:32, fontFamily:"monospace", fontWeight:"bold", color:C.cream, lineHeight:1 }}>{round}</div>
              <div style={{ fontSize:10, color:C.gold, fontFamily:"monospace" }}>OF 5</div>
            </div>
            <Btn onClick={()=>setRound(r=>Math.min(5,r+1))} size="sm" variant="ghost">›</Btn>
          </div>
          <div style={{ fontSize:12, color:C.cream, fontWeight:"600", marginBottom:4 }}>{scenario.rounds[round-1]?.title||"—"}</div>
          <div style={{ fontSize:10, color:C.muted, fontFamily:"monospace" }}>{scenario.rounds[round-1]?.timing}</div>
        </Card>

        {/* Voting */}
        <Card style={{ padding:18 }}>
          <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:12 }}>VOTING</div>
          <div style={{ textAlign:"center", marginBottom:10 }}>
            <div style={{ fontSize:36, fontFamily:"monospace", fontWeight:"bold", color:C.cream, lineHeight:1 }}>{votedCount}<span style={{ fontSize:18, color:C.muted }}>/{activeCount}</span></div>
            <div style={{ fontSize:9, color:C.gold, fontFamily:"monospace", letterSpacing:1, marginTop:2 }}>VOTES CAST</div>
          </div>
          <div style={{ height:4, background:C.faint, borderRadius:2, marginBottom:12, overflow:"hidden" }}>
            <div style={{ height:"100%", background:`linear-gradient(90deg,${C.red},#C03030)`, width:`${(votedCount/activeCount)*100}%`, borderRadius:2 }} />
          </div>
          <div style={{ display:"flex", gap:6 }}>
            <Btn onClick={()=>setVotedCount(v=>Math.min(activeCount,v+1))} size="sm" variant="ghost" full>+1 Vote</Btn>
            <Btn onClick={()=>{setPhase("voting");onToast("Voting opened on all devices","success");}} size="sm" full>Open</Btn>
          </div>
        </Card>
      </div>

      {/* Clue dispatch for this round */}
      <Card style={{ padding:18, marginBottom:14 }}>
        <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:14 }}>CLUE DISPATCH — ROUND {round}</div>
        {roundClues.length===0
          ? <div style={{ fontSize:12, color:C.muted, fontStyle:"italic" }}>No clues configured for this round.</div>
          : (
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {roundClues.map(c => {
                const tc = TYPE_COLORS[c.type]||C.gold;
                const sent = sentClues.has(c.id);
                return (
                  <div key={c.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 14px", background:sent?`${tc}0A`:C.panelLt, border:`1px solid ${sent?tc+"33":C.border}`, borderRadius:6 }}>
                    <div style={{ width:3, alignSelf:"stretch", background:sent?tc:C.faint, borderRadius:2, flexShrink:0 }} />
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ display:"flex", gap:6, alignItems:"center", marginBottom:2 }}>
                        <Badge text={c.type} color={tc} small />
                        {c.private && <Badge text="private" color={C.purp} small />}
                        <span style={{ fontSize:9, color:C.muted, fontFamily:"monospace" }}>{c.time}</span>
                      </div>
                      <div style={{ fontSize:12, color:sent?C.muted:C.cream, fontWeight:"600" }}>{c.title}</div>
                    </div>
                    <Btn onClick={()=>sendClue(c.id)} size="sm" disabled={sent} variant={sent?"ghost":"primary"}>
                      {sent?"SENT":"SEND"}
                    </Btn>
                  </div>
                );
              })}
            </div>
          )}
      </Card>

      {/* Quick actions */}
      <Card style={{ padding:18 }}>
        <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:12 }}>QUICK ACTIONS</div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8 }}>
          {[
            { label:"Pause All",    action:()=>{setTimerOn(false);onToast("All timers paused","success");} },
            { label:"Full Reveal",  action:()=>onToast("Full reveal triggered on main screen","success") },
            { label:"Send Tip",     action:()=>onToast("Anonymous tip sent to all players","success") },
            { label:"End Session",  action:()=>onToast("Session ended — report exported","success") },
          ].map((a,i)=>(
            <Btn key={i} onClick={a.action} size="sm" variant="ghost" full>{a.label}</Btn>
          ))}
        </div>
      </Card>
    </div>
  );
}

// PREVIEW MODE (player's clue feed with current data)
// ══════════════════════════════════════════════════════════════════
function PreviewMode({ scenario }) {
  const [previewChar, setPreviewChar] = useState(scenario.characters[0]?.id||null);
  const [previewRound, setPreviewRound] = useState(1);
  const [filter, setFilter]         = useState("all");
  const [expanded, setExpanded]     = useState(null);

  const char = scenario.characters.find(c=>c.id===previewChar);
  const TC = { dispatch:C.gold, evidence:C.red, private:C.purp, tip:"#608060", final:C.amber };

  const visibleClues = scenario.clues.filter(c => {
    if (c.round > previewRound) return false;
    if (c.private) return c.chars.includes(previewChar);
    return true;
  }).filter(c => filter==="all" || (filter==="private"&&c.private) || (filter==="public"&&!c.private));

  const byRound = visibleClues.reduce((acc,c) => { acc[c.round]=[...(acc[c.round]||[]),c]; return acc; }, {});

  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr 360px", gap:20, alignItems:"start" }}>
      {/* Controls */}
      <div>
        <SectionHead title="Player Preview" />
        <Card style={{ padding:18, marginBottom:14 }}>
          <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:12 }}>PREVIEW SETTINGS</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            <div>
              <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:5 }}>VIEW AS CHARACTER</div>
              <select value={previewChar||""} onChange={e=>setPreviewChar(e.target.value)} style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, color:C.text, borderRadius:4, padding:"9px 12px", fontSize:12, fontFamily:"monospace", outline:"none" }}>
                {scenario.characters.map(c=><option key={c.id} value={c.id}>{c.name} ({c.role})</option>)}
              </select>
            </div>
            <div>
              <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:5 }}>ROUND</div>
              <select value={previewRound} onChange={e=>setPreviewRound(Number(e.target.value))} style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, color:C.text, borderRadius:4, padding:"9px 12px", fontSize:12, fontFamily:"monospace", outline:"none" }}>
                {scenario.rounds.map(r=><option key={r.id} value={r.round}>Round {r.round} — {r.title}</option>)}
              </select>
            </div>
          </div>
        </Card>

        {/* Character summary */}
        {char && (
          <Card style={{ padding:18 }}>
            <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:14 }}>CHARACTER SNAPSHOT</div>
            <div style={{ display:"flex", gap:14, marginBottom:14 }}>
              <div style={{ width:48, height:48, borderRadius:"50%", background:`${ROLE_COLORS[char.role]||C.green}22`, border:`2px solid ${ROLE_COLORS[char.role]||C.green}66`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, color:C.cream, fontWeight:"bold", flexShrink:0 }}>{char.avatar}</div>
              <div>
                <div style={{ fontSize:15, color:C.cream, fontWeight:"700", marginBottom:2 }}>{char.name}</div>
                <div style={{ display:"flex", gap:6 }}>
                  <Badge text={char.role} color={ROLE_COLORS[char.role]||C.green} />
                  <span style={{ fontSize:10, color:C.muted, fontFamily:"monospace", paddingTop:2 }}>{char.position}</span>
                </div>
              </div>
            </div>
            <div style={{ fontSize:11, color:C.muted, marginBottom:4 }}><span style={{ color:C.gold }}>Alibi:</span> {char.alibi}</div>
            <div style={{ fontSize:11, color:C.muted, marginBottom:4 }}><span style={{ color:C.gold }}>Objective:</span> {char.objective}</div>
            <div style={{ fontSize:11, color:C.purp }}><span style={{ color:C.purpLt }}>Secret:</span> {char.secret}</div>
          </Card>
        )}
      </div>

      {/* Phone preview */}
      <div>
        <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, textAlign:"center", marginBottom:12 }}>LIVE PREVIEW</div>
        <div style={{
          width:340, background:"#0D0703", borderRadius:32, border:"2px solid #3A2A10",
          boxShadow:"0 24px 60px rgba(0,0,0,0.7)", overflow:"hidden", fontFamily:"'Playfair Display',serif",
          margin:"0 auto",
        }}>
          {/* Notch */}
          <div style={{ height:28, background:"#070401", display:"flex", alignItems:"center", justifyContent:"center" }}>
            <div style={{ width:80, height:14, background:"#070401", borderRadius:8, border:"1px solid #2A1A08" }} />
          </div>
          {/* Status bar */}
          <div style={{ padding:"8px 16px 6px", display:"flex", justifyContent:"space-between", borderBottom:"1px solid #2A1A08" }}>
            <div style={{ fontSize:9, color:C.gold, fontFamily:"monospace" }}>R{previewRound}</div>
            <div style={{ fontSize:9, color:C.cream, fontFamily:"monospace", fontWeight:"bold", letterSpacing:2 }}>THE SYNDICATE</div>
            <div style={{ display:"flex", gap:2 }}>{[1,2,3].map(i=><div key={i} style={{ width:4,height:4,borderRadius:"50%",background:C.gold }} />)}</div>
          </div>
          {/* Feed header */}
          <div style={{ padding:"10px 14px 8px", borderBottom:"1px solid #2A1A08" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
              <div style={{ fontSize:13, color:C.cream, fontWeight:"700", fontFamily:"'Playfair Display',serif" }}>Clue Feed</div>
              <div style={{ fontSize:9, color:"#7A5F28", fontFamily:"monospace" }}>{visibleClues.length} clue{visibleClues.length!==1?"s":""}</div>
            </div>
            <div style={{ display:"flex", gap:5 }}>
              {["all","public","private"].map(f=>(
                <button key={f} onClick={()=>setFilter(f)} style={{ flex:1, background:filter===f?"rgba(201,168,76,0.15)":"none", border:`1px solid ${filter===f?"rgba(201,168,76,0.4)":"#2A1A08"}`, color:filter===f?C.gold:"#5A4A30", fontSize:8, fontFamily:"monospace", padding:"4px 0", borderRadius:3, cursor:"pointer", textTransform:"uppercase" }}>{f}</button>
              ))}
            </div>
          </div>
          {/* Feed */}
          <div style={{ maxHeight:460, overflowY:"auto", padding:"10px 12px 16px" }}>
            {visibleClues.length===0 ? (
              <div style={{ textAlign:"center", padding:"32px 16px", color:"#3A2A10", fontStyle:"italic", fontSize:12 }}>No clues visible at this point.</div>
            ) : (
              Object.entries(byRound).sort((a,b)=>b[0]-a[0]).map(([r,clues])=>(
                <div key={r}>
                  <div style={{ display:"flex", alignItems:"center", gap:6, margin:"12px 0 8px" }}>
                    <div style={{ flex:1, height:1, background:"linear-gradient(to right,transparent,rgba(201,168,76,0.2))" }} />
                    <div style={{ fontSize:8, color:"#5A4A30", fontFamily:"monospace", letterSpacing:1 }}>ROUND {r}</div>
                    <div style={{ flex:1, height:1, background:"linear-gradient(to left,transparent,rgba(201,168,76,0.2))" }} />
                  </div>
                  {[...clues].reverse().map(c=>{
                    const tc=TC[c.type]||C.gold;
                    const isExp = expanded===c.id;
                    return (
                      <div key={c.id} onClick={()=>setExpanded(isExp?null:c.id)} style={{
                        background:c.private?"#0E0414":"#120A02",
                        border:`1px solid ${tc}${isExp?"55":"22"}`,
                        borderLeft:`3px solid ${tc}`,
                        borderRadius:"0 6px 6px 0", padding:"9px 12px", marginBottom:7,
                        cursor:"pointer",
                      }}>
                        <div style={{ display:"flex", gap:6, alignItems:"center", marginBottom:4 }}>
                          <span style={{ fontSize:8, color:tc, fontFamily:"monospace", letterSpacing:1 }}>{c.type.toUpperCase()}</span>
                          {c.private && <span style={{ fontSize:7, color:"#7A50A0", fontFamily:"monospace", background:"rgba(58,26,92,0.3)", border:"1px solid rgba(58,26,92,0.5)", padding:"1px 5px", borderRadius:2 }}>ONLY YOU</span>}
                          <span style={{ fontSize:8, color:"#5A4A30", fontFamily:"monospace", marginLeft:"auto" }}>{c.time}</span>
                        </div>
                        <div style={{ fontSize:12, color:C.cream, fontWeight:"600", marginBottom:3, fontFamily:"'Playfair Display',serif" }}>{c.title}</div>
                        <div style={{ fontSize:11, color:c.private?"#C0A0E0":"#8A7050", lineHeight:1.5, display:isExp?"block":"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical", overflow:isExp?"visible":"hidden", fontStyle:c.private?"italic":"normal" }}>
                          {c.text}
                        </div>
                      </div>
                    );
                  })}
                </div>
              ))
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// STORY EDITOR
// ══════════════════════════════════════════════════════════════════
function StoryEditor({ scenario, onChange }) {
  const blank = { tagline:"", venue:"", date:"", premise:"", victim:"", victimBackground:"", masterTruth:"", hostOpeningScript:"", winCondition:"" };
  const [draft, setDraft] = useState({ ...blank, ...(scenario.story||{}) });
  const [saved, setSaved] = useState(false);

  function set(k,v) { setDraft(d=>({...d,[k]:v})); setSaved(false); }
  function save() { onChange({ story: draft }); setSaved(true); }

  const fields = [
    { key:"tagline",           label:"Tagline",                  hint:"Short evocative subtitle shown on the big screen and player app",    multiline:false },
    { key:"venue",             label:"Venue / Location",         hint:"Where the story takes place",                                         multiline:false },
    { key:"date",              label:"In-Game Date",             hint:"The date the story is set",                                           multiline:false },
    { key:"victim",            label:"Victim Name",              hint:"The name of the person who was killed",                               multiline:false },
    { key:"victimBackground",  label:"Victim Background",        hint:"Context for who the victim was and why they mattered",               multiline:true, rows:3 },
    { key:"premise",           label:"Story Premise",            hint:"Opening situation shown to players on the instruction screen",        multiline:true, rows:4 },
    { key:"hostOpeningScript", label:"Host Opening Script",      hint:"Word-for-word script the host reads to open the game",               multiline:true, rows:4 },
    { key:"winCondition",      label:"Win Condition",            hint:"How each side wins — displayed on the instructions screen",           multiline:false },
  ];

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:24 }}>
        <div>
          <div style={{ fontSize:16, color:C.cream, fontFamily:"'Playfair Display',serif", fontWeight:"700", marginBottom:4 }}>Story & Game Details</div>
          <div style={{ fontSize:11, color:C.muted }}>Edit the core narrative, victim, master truth, and host scripts for this scenario.</div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          {saved && <div style={{ fontSize:10, color:C.green, fontFamily:"monospace", letterSpacing:1 }}>✓ SAVED</div>}
          <Btn onClick={save}>Save All Changes</Btn>
        </div>
      </div>

      <Card style={{ padding:20, marginBottom:20 }}>
        <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:14 }}>SCENARIO IDENTITY</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
          <div>
            <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:5 }}>SCENARIO NAME</div>
            <input value={scenario.name} onChange={e=>onChange({name:e.target.value})}
              style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, borderRadius:4, padding:"9px 12px", color:C.text, fontSize:12, fontFamily:"monospace", outline:"none", boxSizing:"border-box" }} />
          </div>
          <div>
            <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:5 }}>SETTING</div>
            <input value={scenario.setting} onChange={e=>onChange({setting:e.target.value})}
              style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, borderRadius:4, padding:"9px 12px", color:C.text, fontSize:12, fontFamily:"monospace", outline:"none", boxSizing:"border-box" }} />
          </div>
          <div>
            <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:5 }}>STATUS</div>
            <select value={scenario.status} onChange={e=>onChange({status:e.target.value})}
              style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, borderRadius:4, padding:"9px 12px", color:C.text, fontSize:12, fontFamily:"monospace", outline:"none" }}>
              <option value="draft">Draft</option>
              <option value="active">Active</option>
              <option value="archived">Archived</option>
            </select>
          </div>
        </div>
      </Card>

      <Card style={{ padding:20, marginBottom:20, border:`1px solid ${C.red}33`, background:"rgba(192,57,43,0.08)" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:6 }}>
          <div style={{ width:8, height:8, borderRadius:"50%", background:C.red }} />
          <div style={{ fontSize:9, color:C.red, fontFamily:"monospace", letterSpacing:2 }}>MASTER TRUTH — HOST EYES ONLY</div>
        </div>
        <div style={{ fontSize:11, color:C.muted, marginBottom:12 }}>The full solution — killer, method, motive, accomplices. Never shown to players.</div>
        <textarea value={draft.masterTruth} onChange={e=>set("masterTruth",e.target.value)} rows={5}
          style={{ width:"100%", background:C.bg, border:`1px solid ${C.red}33`, borderRadius:4, padding:"9px 12px", color:C.text, fontSize:12, fontFamily:"monospace", outline:"none", resize:"vertical", boxSizing:"border-box" }} />
      </Card>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
        {fields.map(f => (
          <Card key={f.key} style={{ padding:18, gridColumn: f.multiline && (f.rows||0)>=4 ? "1 / -1" : undefined }}>
            <div style={{ fontSize:9, color:C.goldDim, fontFamily:"monospace", letterSpacing:2, marginBottom:5 }}>{f.label.toUpperCase()}</div>
            <div style={{ fontSize:10, color:C.muted, marginBottom:10 }}>{f.hint}</div>
            {f.multiline
              ? <textarea value={draft[f.key]||""} onChange={e=>set(f.key,e.target.value)} rows={f.rows||3}
                  style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, borderRadius:4, padding:"9px 12px", color:C.text, fontSize:12, fontFamily:"monospace", outline:"none", resize:"vertical", boxSizing:"border-box" }} />
              : <input value={draft[f.key]||""} onChange={e=>set(f.key,e.target.value)}
                  style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, borderRadius:4, padding:"9px 12px", color:C.text, fontSize:12, fontFamily:"monospace", outline:"none", boxSizing:"border-box" }} />
            }
          </Card>
        ))}
      </div>

      <div style={{ marginTop:20, display:"flex", justifyContent:"flex-end", gap:10 }}>
        {saved && <div style={{ fontSize:10, color:C.green, fontFamily:"monospace", letterSpacing:1, alignSelf:"center" }}>✓ ALL CHANGES SAVED</div>}
        <Btn onClick={save} size="lg">Save All Changes</Btn>
      </div>
    </div>
  );
}
