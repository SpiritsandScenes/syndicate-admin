<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#06050A"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>The Syndicate — Enter</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎭</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #06050A;
      --gold:    #C9A84C;
      --goldDim: #6B531F;
      --cream:   #F0E4C4;
      --muted:   #6A6080;
      --red:     #8B2020;
      --panel:   rgba(255,255,255,0.04);
      --border:  rgba(201,168,76,0.2);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100vh; background: var(--bg); }

    body {
      font-family: 'Josefin Sans', sans-serif;
      color: var(--cream);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Atmospheric background ── */
    .bg-texture {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 20% 80%, rgba(139,32,32,0.08) 0%, transparent 60%),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(255,255,255,0.008) 2px,
          rgba(255,255,255,0.008) 4px
        );
      pointer-events: none;
    }

    /* ── Decorative art-deco lines ── */
    .deco-top {
      position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 10;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.6;
    }
    .deco-bottom {
      position: fixed; bottom: 0; left: 0; right: 0; height: 1px; z-index: 10;
      background: linear-gradient(90deg, transparent, var(--goldDim), transparent);
    }

    /* ── Main layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px;
      gap: 0;
    }

    /* ── Header crest ── */
    .crest {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 40px;
      animation: fadeDown 0.8s ease both;
    }
    .crest-rule {
      width: 120px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin-bottom: 16px;
    }
    .crest-icon {
      font-size: 36px; margin-bottom: 12px; opacity: 0.9;
      filter: drop-shadow(0 0 12px rgba(201,168,76,0.4));
    }
    .crest-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.45em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .crest-sub {
      font-size: 9px; letter-spacing: 0.3em;
      color: var(--muted); text-transform: uppercase;
    }
    .crest-rule-bottom {
      width: 60px; height: 1px; margin-top: 16px;
      background: linear-gradient(90deg, transparent, var(--goldDim), transparent);
    }

    /* ── Scenario card shown after code is validated ── */
    .scenario-card {
      width: 100%; max-width: 360px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 28px 24px;
      margin-bottom: 28px;
      animation: fadeUp 0.6s ease 0.2s both;
      position: relative;
      overflow: hidden;
    }
    .scenario-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .scenario-label {
      font-size: 9px; letter-spacing: 0.35em;
      color: var(--goldDim); text-transform: uppercase;
      margin-bottom: 6px;
    }
    .scenario-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px; font-weight: 700;
      color: var(--cream); line-height: 1.2;
      margin-bottom: 16px;
    }
    .scenario-meta {
      display: flex; flex-direction: column; gap: 6px;
    }
    .meta-row {
      display: flex; align-items: baseline; gap: 8px;
    }
    .meta-key {
      font-size: 8px; letter-spacing: 0.3em;
      color: var(--muted); text-transform: uppercase;
      min-width: 52px;
    }
    .meta-val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px; color: var(--cream); opacity: 0.8;
    }

    /* ── Character reveal ── */
    .char-card {
      width: 100%; max-width: 360px;
      background: rgba(201,168,76,0.05);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 2px;
      padding: 28px 24px;
      margin-bottom: 28px;
      animation: fadeUp 0.6s ease 0.35s both;
      position: relative;
    }
    .char-card::after {
      content: '';
      position: absolute; inset: 0; border-radius: 2px;
      background: radial-gradient(ellipse at top, rgba(201,168,76,0.04), transparent 70%);
      pointer-events: none;
    }
    .char-label {
      font-size: 9px; letter-spacing: 0.35em;
      color: var(--gold); text-transform: uppercase;
      margin-bottom: 12px;
    }
    .char-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(201,168,76,0.15);
      border: 1px solid rgba(201,168,76,0.4);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 16px; font-weight: 600; letter-spacing: 0.05em;
      color: var(--gold);
      margin-bottom: 14px;
    }
    .char-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 700; font-style: italic;
      color: var(--cream); margin-bottom: 4px;
    }
    .char-position {
      font-size: 10px; letter-spacing: 0.25em;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 16px;
    }
    .char-divider {
      height: 1px; margin: 16px 0;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }
    .char-alibi-label {
      font-size: 8px; letter-spacing: 0.3em;
      color: var(--goldDim); text-transform: uppercase; margin-bottom: 6px;
    }
    .char-alibi {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px; color: var(--cream); opacity: 0.75;
      line-height: 1.5; font-style: italic;
    }

    /* ── Code entry form ── */
    .entry-form {
      width: 100%; max-width: 360px;
      animation: fadeUp 0.6s ease 0.1s both;
    }
    .entry-label {
      font-size: 9px; letter-spacing: 0.4em;
      color: var(--gold); text-transform: uppercase;
      display: block; margin-bottom: 10px;
    }
    .code-input {
      width: 100%; padding: 16px 18px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 20px; font-weight: 600;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--cream); outline: none;
      text-align: center;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 14px;
      -webkit-appearance: none;
    }
    .code-input::placeholder { color: var(--muted); font-weight: 300; letter-spacing: 0.1em; }
    .code-input:focus {
      border-color: rgba(201,168,76,0.5);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
    }
    .code-input.error { border-color: rgba(180,50,50,0.6); animation: shake 0.3s ease; }

    .btn-primary {
      width: 100%; padding: 16px;
      background: var(--gold);
      border: none; border-radius: 2px;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.35em; text-transform: uppercase;
      color: #1a1200; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary:active { transform: scale(0.98); opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-enter {
      width: 100%; max-width: 360px;
      padding: 18px;
      background: linear-gradient(135deg, #1a1200, #2a1e00);
      border: 1px solid var(--gold);
      border-radius: 2px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px; font-weight: 600; font-style: italic;
      letter-spacing: 0.1em;
      color: var(--gold); cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      animation: fadeUp 0.6s ease 0.5s both;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 0 20px rgba(201,168,76,0.1);
    }
    .btn-enter:active { transform: scale(0.98); }
    .btn-enter:hover { background: linear-gradient(135deg, #221800, #3a2a00); box-shadow: 0 0 30px rgba(201,168,76,0.2); }

    /* ── Status messages ── */
    .status-msg {
      font-size: 10px; letter-spacing: 0.25em;
      text-transform: uppercase; text-align: center;
      padding: 10px; margin-bottom: 14px;
      border-radius: 2px;
    }
    .status-msg.error { color: #e57373; background: rgba(180,50,50,0.1); border: 1px solid rgba(180,50,50,0.2); }
    .status-msg.loading { color: var(--muted); }

    /* ── Lobby waiting state ── */
    .lobby-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px;
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 20px;
      font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 24px;
      animation: fadeUp 0.4s ease 0.6s both;
    }
    .lobby-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold);
      animation: pulse 1.8s ease infinite;
    }

    /* ── Animations ── */
    @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(16px); }  to { opacity:1; transform:translateY(0); } }
    @keyframes shake    { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    @keyframes pulse    { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
    @keyframes spin     { to { transform: rotate(360deg); } }

    .spinner {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid rgba(201,168,76,0.2);
      border-top-color: var(--gold);
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 40px;
      font-size: 8px; letter-spacing: 0.3em;
      color: var(--muted); text-transform: uppercase;
      text-align: center;
      animation: fadeUp 0.5s ease 0.8s both;
    }
  </style>
</head>
<body>
<div class="bg-texture"></div>
<div class="deco-top"></div>
<div class="deco-bottom"></div>

<div class="page" id="page">
  <!-- Content injected by JS -->
  <div class="crest">
    <div class="crest-rule"></div>
    <div class="crest-icon">🎭</div>
    <div class="crest-title">The Syndicate</div>
    <div class="crest-sub">Murder Mystery Experience</div>
    <div class="crest-rule-bottom"></div>
  </div>
  <div id="app-content">
    <div style="text-align:center;color:var(--muted);font-size:11px;letter-spacing:0.2em;">
      <div class="spinner" style="margin:0 auto 16px;"></div>
      LOADING
    </div>
  </div>
  <div class="footer">thesyndicate.game &nbsp;·&nbsp; keep this page open</div>
</div>

<script src="../syndicate-data.js"></script>
<script>
// ── Read code from URL ─────────────────────────────────────────
const params  = new URLSearchParams(window.location.search);
const urlCode = params.get("code") || "";
let   gameState = null;
let   foundPlayer = null;

// ── Render: code entry form ────────────────────────────────────
function renderCodeEntry(prefill = "", errorMsg = "") {
  document.getElementById("app-content").innerHTML = `
    <div class="entry-form">
      ${errorMsg ? `<div class="status-msg error">${errorMsg}</div>` : ""}
      <label class="entry-label" for="codeInput">Your Game Code</label>
      <input
        class="code-input${errorMsg ? " error" : ""}"
        id="codeInput"
        type="text"
        inputmode="text"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        maxlength="10"
        placeholder="XXXX-0000"
        value="${prefill}"
      />
      <button class="btn-primary" id="codeBtn" onclick="submitCode()">
        Find My Character
      </button>
    </div>
  `;
  const inp = document.getElementById("codeInput");
  if (inp) {
    inp.focus();
    inp.addEventListener("keydown", e => { if (e.key === "Enter") submitCode(); });
    inp.addEventListener("input", () => {
      inp.classList.remove("error");
      document.querySelector(".status-msg.error")?.remove();
    });
  }
}

// ── Render: player + character reveal ─────────────────────────
function renderCharacterReveal(player, state) {
  const char = state.characters[player.character];
  if (!char) { renderCodeEntry(player.code, "Character data missing. Contact the host."); return; }

  const isLobby = state.currentRound === 0 || state.gamePhase === "lobby";

  document.getElementById("app-content").innerHTML = `
    <div class="scenario-card">
      <div class="scenario-label">Tonight's Event</div>
      <div class="scenario-name">${state.scenarioName}</div>
      <div class="scenario-meta">
        <div class="meta-row">
          <span class="meta-key">Venue</span>
          <span class="meta-val">${state.venue}</span>
        </div>
        <div class="meta-row">
          <span class="meta-key">Date</span>
          <span class="meta-val">${state.date}</span>
        </div>
      </div>
    </div>

    <div class="char-card">
      <div class="char-label">You Are</div>
      <div class="char-avatar">${char.avatar}</div>
      <div class="char-name">${char.name}</div>
      <div class="char-position">${char.position}</div>
      <div class="char-divider"></div>
      <div class="char-alibi-label">Your Alibi</div>
      <div class="char-alibi">${char.alibi}</div>
    </div>

    ${isLobby ? `
      <div class="lobby-badge">
        <div class="lobby-dot"></div>
        Waiting for the host to begin
      </div>
    ` : ""}

    <button class="btn-enter" onclick="enterGame('${player.code}')">
      ${isLobby ? "I'm Ready — Enter The Syndicate" : "Enter The Game →"}
    </button>
  `;
}

// ── Render: error state ────────────────────────────────────────
function renderError(msg) {
  document.getElementById("app-content").innerHTML = `
    <div class="entry-form">
      <div class="status-msg error">${msg}</div>
      <button class="btn-primary" onclick="renderCodeEntry('${urlCode}')">Try Again</button>
    </div>
  `;
}

// ── Submit code ────────────────────────────────────────────────
async function submitCode() {
  const inp = document.getElementById("codeInput");
  const code = (inp ? inp.value : urlCode).toUpperCase().trim();
  if (!code) { renderCodeEntry("", "Please enter your game code"); return; }

  // Show loading
  const btn = document.getElementById("codeBtn");
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; }

  try {
    gameState = await SyndicateSync.read();
    foundPlayer = getPlayerByCode(gameState, code);

    if (!foundPlayer) {
      renderCodeEntry(code, `Code "${code}" not found. Check your invite card.`);
      return;
    }
    // Mark player as joined
    foundPlayer.joined = true;
    foundPlayer.lastSeen = new Date().toISOString();
    await SyndicateSync.write(gameState);
    renderCharacterReveal(foundPlayer, gameState);
  } catch(e) {
    renderCodeEntry(code, "Connection error. Please try again.");
  }
}

// ── Enter the game ─────────────────────────────────────────────
function enterGame(code) {
  // Navigate to play page
  const base = window.location.href.replace(/\/join\/?.*/, "");
  window.location.href = `${base}/play/?code=${code}`;
}

// ── Init ───────────────────────────────────────────────────────
async function init() {
  if (urlCode) {
    // Code came from QR scan — auto-submit
    document.getElementById("app-content").innerHTML = `
      <div style="text-align:center;color:var(--muted);font-size:11px;letter-spacing:0.2em;">
        <div class="spinner" style="margin:0 auto 16px;"></div>
        VERIFYING CODE
      </div>
    `;
    // small delay for UX
    setTimeout(async () => {
      gameState = await SyndicateSync.read();
      foundPlayer = getPlayerByCode(gameState, urlCode);
      if (foundPlayer) {
        foundPlayer.joined = true;
        foundPlayer.lastSeen = new Date().toISOString();
        await SyndicateSync.write(gameState);
        renderCharacterReveal(foundPlayer, gameState);
      } else {
        renderCodeEntry(urlCode, `Code "${urlCode.toUpperCase()}" not recognised. Check your invite card.`);
      }
    }, 600);
  } else {
    // No code — show entry form
    renderCodeEntry();
  }
}

init();
</script>
</body>
</html>
